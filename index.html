<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Li Ning — Официальный дистрибьютор в Узбекистане</title>
  <meta name="description" content="Официальный дистрибьютор Li Ning в Узбекистане. Оригинальные кроссовки, спортивная одежда и аксессуары. 14 магазинов в Ташкенте, Самарканде и Андижане.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/styles.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8K29V08VJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8K29V08VJM');
  </script>  
</head>
<body>

  <!-- Navbar -->
  <div id="navbar-placeholder" data-transparent="true"></div>

  <!-- HERO SLIDER -->
  <div class="hero-slider" id="hero-slider">
    <!-- skeleton пока грузятся слайды -->
    <div class="hero-slide active" id="slider-skeleton" style="background:#f5f5f3;display:flex;align-items:center;justify-content:center">
      <div style="position:relative;width:160px;height:80px;overflow:hidden">
        <img src="logo.png" alt="Li-Ning" style="width:160px;height:80px;object-fit:contain;filter:grayscale(1) opacity(.18);display:block">
        <div style="position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.85) 50%,transparent 70%);background-size:300% 100%;animation:lnShimmer 1.4s ease-in-out infinite"></div>
      </div>
    </div>
    <!-- Slider controls -->
    <div class="slider-controls" id="slider-controls">
      <div class="slider-dots" id="slider-dots">
        <div class="slider-dot active" onclick="goToSlide(0)"></div>
      </div>
    </div>
  </div>

  <!-- Collections Grid — заменяет categories-grid -->
  <div class="collections-section">
    <div class="collections-header">
      <div>
        <div class="section-label">Коллекции</div>
        <div class="section-title">КАТЕГОРИИ</div>
      </div>
      <a href="catalog.html" class="see-all">Все →</a>
    </div>
    
    <div class="collections-grid">
    <a href="catalog.html" class="collections-side-label">
      <span>Все</span>
      <span>—</span>
      <span>Коллекции</span>
    </a>

    <a href="catalog.html?collection=Fitness" class="collection-card">
      <div class="collection-img-wrap">
        <img src="images/collections/Fitness.png" alt="Фитнес">
      </div>
      <div class="collection-label">ФИТНЕС</div>
    </a>
        
    <a href="catalog.html?collection=Sportlife" class="collection-card">
      <div class="collection-img-wrap">
        <img src="images/collections/Sportstyle.png" alt="Спортстиль">
      </div>
      <div class="collection-label">SPORTLIFE</div>
    </a>

    <a href="catalog.html?collection=Wade" class="collection-card">
      <div class="collection-img-wrap">
        <img src="images/collections/wade.png" alt="Wade">
      </div>
      <div class="collection-label">WADE</div>
    </a>

    <a href="catalog.html?collection=Running" class="collection-card">
      <div class="collection-img-wrap">
        <img src="images/collections/Running.png" alt="Бег">
      </div>
      <div class="collection-label">БЕГ</div>
    </a>

    <a href="catalog.html?collection=Basketball" class="collection-card">
      <div class="collection-img-wrap">
        <img src="images/collections/basketball.png" alt="Баскетбол">
      </div>
      <div class="collection-label">БАСКЕТБОЛ</div>
    </a>

    </div>
  </div>

  <script>
  (function () {
    var grid = document.querySelector('.collections-grid');
    var section = document.querySelector('.collections-section');
    if (!grid || !section) return;
    function updateFades() {
      var atStart = grid.scrollLeft < 5;
      var atEnd = grid.scrollLeft + grid.clientWidth >= grid.scrollWidth - 5;
      section.classList.toggle('coll-scrolled', !atStart);
      section.classList.toggle('coll-at-end', atEnd);
    }
    grid.addEventListener('scroll', updateFades, { passive: true });
    updateFades();
  })();
  </script>

  <!-- Popular Products -->
  <section class="section" style="background: var(--white)">
    <div class="section-inner">
      <div class="section-head">
        <div>
          <div class="section-label ln-words">Хиты продаж</div>
          <div class="section-title ln-words">ПОПУЛЯРНЫЕ<br>ТОВАРЫ</div>
        </div>
        <a href="catalog.html" class="see-all">Все товары →</a>
      </div>
      <div class="products-grid" id="home-products">
        <div style="padding:3rem;text-align:center;color:#aaa">Загрузка товаров...</div>
      </div>
    </div>
  </section>

  <!-- Reviews -->
  <section class="reviews-section section">
    <div class="section-inner">
      <div class="section-label ln-words">Отзывы покупателей</div>
      <div class="section-title ln-words" style="margin-bottom:2rem">ЧТО ГОВОРЯТ<br>КЛИЕНТЫ</div>
      <div class="reviews-summary">
        <div>
          <div class="rating-big" id="rating-big-value">—</div>
          <div class="review-stars" id="rating-stars-big" style="color:var(--gold);font-size:1.2rem;margin:.4rem 0">☆☆☆☆☆</div>
          <div style="font-size:.78rem;color:var(--gray-300)" id="rating-count-text">Загрузка...</div>
        </div>
        <div class="rating-bars">
          <div class="rating-bar-row"><span>5 ★</span><div class="rating-bar"><div class="rating-bar-fill" id="bar-fill-5" style="width:0%"></div></div><span id="bar-pct-5">—</span></div>
          <div class="rating-bar-row"><span>4 ★</span><div class="rating-bar"><div class="rating-bar-fill" id="bar-fill-4" style="width:0%"></div></div><span id="bar-pct-4">—</span></div>
          <div class="rating-bar-row"><span>3 ★</span><div class="rating-bar"><div class="rating-bar-fill" id="bar-fill-3" style="width:0%"></div></div><span id="bar-pct-3">—</span></div>
          <div class="rating-bar-row"><span>2 ★</span><div class="rating-bar"><div class="rating-bar-fill" id="bar-fill-2" style="width:0%"></div></div><span id="bar-pct-2">—</span></div>
          <div class="rating-bar-row"><span>1 ★</span><div class="rating-bar"><div class="rating-bar-fill" id="bar-fill-1" style="width:0%"></div></div><span id="bar-pct-1">—</span></div>
        </div>
      </div>
      <div class="reviews-grid" id="reviews-grid">
        <div style="grid-column:1/-1;padding:3rem;text-align:center;color:var(--gray-400);font-size:.88rem">Загрузка отзывов...</div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script>
    window.addEventListener('load', () => {
      if (window.innerWidth > 768) return;
      const grid = document.querySelector('.collections-grid');
      if (!grid) return;
      setTimeout(() => {
        grid.scrollTo({ left: 75, behavior: 'smooth' });
        setTimeout(() => grid.scrollTo({ left: 0, behavior: 'smooth' }), 700);
      }, 1400);
    });
  </script>

  <!-- MODALS -->
  <div id="modals-placeholder"></div>
    
</body>
</html>
