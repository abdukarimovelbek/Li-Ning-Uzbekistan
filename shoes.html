<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Обувь — Li Ning Store</title>
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8K29V08VJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8K29V08VJM');
  </script>  
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>  
  <div class="page-header">
    <div class="page-header-inner">
      <div class="breadcrumb" data-manual="true">
        <a href="index.html">Главная</a><span>/</span><span>Обувь</span>
      </div>
      <h1>ОБУВЬ</h1>
    </div>
  </div>

  <!-- Sub-categories -->
  <div style="background:var(--white);padding:1.5rem 2rem;border-bottom:1px solid var(--gray-100)">
    <div style="max-width:1400px;margin:0 auto;display:flex;gap:0.8rem;flex-wrap:wrap">
      <button class="size-btn active" style="min-width:auto;padding:.45rem 1.2rem" onclick="filterByType(this,'all')">Все</button>
      <button class="size-btn" style="min-width:auto;padding:.45rem 1.2rem" onclick="filterByType(this,'running')">Бег</button>
      <button class="size-btn" style="min-width:auto;padding:.45rem 1.2rem" onclick="filterByType(this,'trail')">Трейл</button>
      <button class="size-btn" style="min-width:auto;padding:.45rem 1.2rem" onclick="filterByType(this,'training')">Тренировка</button>
      <button class="size-btn" style="min-width:auto;padding:.45rem 1.2rem" onclick="filterByType(this,'lifestyle')">Лайфстайл</button>
      <button class="size-btn" style="min-width:auto;padding:.45rem 1.2rem" onclick="filterByType(this,'basketball')">Баскетбол</button>
    </div>
  </div>

  <section class="section">
    <div class="section-inner">
      <div class="catalog-toolbar">
        <div class="catalog-count">Найдено <strong>8</strong> товаров</div>
        <div class="catalog-sort">
          <select><option>По умолчанию</option><option value="price-asc">Цена ↑</option><option value="price-desc">Цена ↓</option><option value="rating">По рейтингу</option></select>
        </div>
      </div>
      <div class="products-grid" id="shoes-products">
        
      </div>
    </div>
  </section>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script>
  function filterByType(btn, type) {
    document.querySelectorAll('[onclick^="filterByType"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.product-card').forEach(card => {
      if (type === 'all' || card.dataset.type === type) {
        card.style.display = '';
      } else {
        card.style.display = 'none';
      }
    });
    const visible = document.querySelectorAll('.product-card:not([style*="none"])').length;
    const countEl = document.querySelector('.catalog-count strong');
    if (countEl) countEl.textContent = visible;
  }
  </script>

  <!-- CITY MODAL -->
  <div id="modals-placeholder"></div>

</body>
</html>
