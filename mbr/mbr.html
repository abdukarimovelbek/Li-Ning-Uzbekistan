<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MBR · Li-Ning UZ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mbr.css">
</head>
<body>

  <!-- Live-индикатор -->
  <div id="livePill" class="live-pill" title="Данные обновляются автоматически при сохранении в редакторе">
    <span class="dot"></span> LIVE
  </div>

  <!-- =================== Director selection screen =================== -->
  <div id="selectScreen" class="select-screen">
    <div class="select-inner">
      <div class="select-brand">
        <span class="brand-badge">LI-NING UZ</span>
        <h1 class="brand-mbr">M<span class="b">B</span>R</h1>
        <div class="brand-sub">Monthly Business Review<br>Ежемесячный разбор результатов</div>
      </div>

      <div class="select-right">
        <div class="select-label">Выберите презентующего</div>
        <div id="directorGrid" class="director-grid"></div>
        <button class="btn-all" id="openAllBtn">Открыть всю презентацию →</button>
        <div class="select-tools"></div>
      </div>
    </div>
  </div>

  <!-- =================== Presentation deck =================== -->
  <main id="deck" class="deck hidden">
    <div id="slide" class="slide"></div>

    <div class="navbar">
      <button id="prevBtn" class="nav-btn" title="Назад (←)">‹</button>
      <span id="pageIndicator" class="nav-counter">1 / 8</span>
      <button id="nextBtn" class="nav-btn" title="Вперёд (→)">›</button>

      <div class="nav-spacer"></div>

      <button id="editBtn" class="nav-btn" title="Открыть редактор (E)">Редактор ↗</button>
      <button id="homeBtn" class="nav-btn" title="К выбору директора (H)">Меню</button>
      <button id="resetBtn" class="nav-btn nav-reset" title="Перезагрузить">↻</button>
    </div>
  </main>

  <!-- =================== Toast =================== -->
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="mbr-supabase.js"></script>
  <script src="mbr.js"></script>
</body>
</html>
