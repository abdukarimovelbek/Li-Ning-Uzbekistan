  <style>
    .wishlist-page { padding: 3rem 2rem 5rem; max-width: 1400px; margin: 0 auto; }
    .wishlist-header { margin-bottom: 2.5rem; }
    .wishlist-empty {
      text-align: center; padding: 6rem 2rem;
      display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
    }
    .wishlist-empty-icon { font-size: 4rem; }
    .wishlist-empty-title { font-family: var(--font-display); font-size: 2rem; letter-spacing: 2px; color: var(--gray-900); }
    .wishlist-empty-sub { font-size: 0.9rem; color: var(--gray-500); }
    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem;
    }
    .wishlist-remove-btn {
      position: absolute; top: 0.8rem; right: 0.8rem;
      width: 32px; height: 32px;
      background: var(--white); border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--red);
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      cursor: pointer; z-index: 2;
      transition: background var(--transition), transform var(--transition);
    }
    .wishlist-remove-btn:hover { background: var(--red); color: #fff; transform: scale(1.1); }
    .wishlist-count {
      font-size: 0.82rem; color: var(--gray-500); margin-top: 0.3rem;
    }
  </style>
</head>

<body>
  <!-- ════════ LI-NING CINEMATIC LOADER — Ink ════════ -->
  <div id="ln-loader" aria-hidden="true">
    <div class="ln-load-stage">
      <img class="ln-load-logo" src="logo.jpg" alt="Li-Ning">
      <div class="ln-load-sub">Official Distributor · Uzbekistan</div>
    </div>
    <div class="ln-load-bar"><i></i></div>
    <div class="ln-load-meta">
      <div class="ln-load-num">0<small>%</small></div>
      <div class="ln-load-status">Подготовка коллекции</div>
    </div>
    <div class="ln-load-curtain"><span></span><span></span><span></span><span></span><span></span></div>
  </div>
  <style>
  #ln-loader{position:fixed;inset:0;z-index:99999;background:#141414;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
  #ln-loader.ln-done{pointer-events:none}
  .ln-load-stage{position:relative;text-align:center;z-index:2}
  .ln-load-logo{height:clamp(46px,7vw,78px);width:auto;filter:invert(1) brightness(1.6);display:block;margin:0 auto;clip-path:inset(0 100% 0 0);opacity:0}
  .ln-load-sub{margin-top:1.4rem;font-size:.7rem;letter-spacing:.5em;text-transform:uppercase;color:rgba(255,255,255,.5);padding-left:.5em;opacity:0;transform:translateY(8px)}
  .ln-load-bar{position:absolute;left:7vw;right:7vw;bottom:7%;height:2px;background:rgba(255,255,255,.12);z-index:2}
  .ln-load-bar i{display:block;height:100%;width:0;background:#C41E3A;box-shadow:0 0 12px #C41E3A;transition:width .1s linear}
  .ln-load-meta{position:absolute;left:0;right:0;bottom:9%;display:flex;align-items:flex-end;justify-content:space-between;padding:0 7vw;z-index:2}
  .ln-load-num{font-family:'Bebas Neue','Oswald',sans-serif;font-size:clamp(3rem,9vw,7rem);line-height:.8;color:#fff;letter-spacing:2px}
  .ln-load-num small{font-size:.32em;vertical-align:super;color:#C41E3A}
  .ln-load-status{font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;text-align:right;max-width:45%}
  .ln-load-curtain{position:absolute;inset:0;z-index:5;display:flex;pointer-events:none}
  .ln-load-curtain span{flex:1;background:#141414;transform:translateY(0)}
  @media(prefers-reduced-motion:reduce){#ln-loader{display:none!important}}
  </style>
  <script>
  (function(){
    var L=document.getElementById('ln-loader'); if(!L) return;
    if(sessionStorage.getItem('ln_intro_seen')){ L.parentNode.removeChild(L); return; }
    var logo=L.querySelector('.ln-load-logo'), sub=L.querySelector('.ln-load-sub'),
        bar=L.querySelector('.ln-load-bar i'), num=L.querySelector('.ln-load-num'),
        status=L.querySelector('.ln-load-status'), curtain=L.querySelector('.ln-load-curtain');
    var statuses=['Подготовка коллекции','Загрузка витрины','Полировка пикселей','Почти готово'];
    document.documentElement.style.overflow='hidden';
    setTimeout(function(){ logo.style.transition='clip-path 1.1s cubic-bezier(.76,0,.24,1),opacity .5s'; logo.style.clipPath='inset(0 0 0 0)'; logo.style.opacity='1'; },150);
    setTimeout(function(){ sub.style.transition='opacity .8s,transform .8s cubic-bezier(.22,1,.36,1)'; sub.style.opacity='1'; sub.style.transform='none'; },700);
    var t0=performance.now(), DUR=2000, done=false;
    function reveal(){
      if(done) return; done=true;
      sessionStorage.setItem('ln_intro_seen','1');
      document.documentElement.style.overflow='';
      [].forEach.call(curtain.children,function(s,i){ s.style.transition='transform .75s cubic-bezier(.76,0,.24,1) '+(i*0.07)+'s'; s.style.transform='translateY(-101%)'; });
      setTimeout(function(){ L.classList.add('ln-done'); L.style.transition='opacity .3s'; L.style.opacity='0'; },300);
      setTimeout(function(){ if(L.parentNode) L.parentNode.removeChild(L); },1150);
    }
    function tick(now){
      var p=Math.min((now-t0)/DUR,1), e=1-Math.pow(1-p,3), v=Math.round(e*100);
      num.firstChild.nodeValue=v; bar.style.width=v+'%';
      status.textContent=statuses[Math.min(3,Math.floor(p*4))];
      if(p<1) requestAnimationFrame(tick); else setTimeout(reveal,260);
    }
    requestAnimationFrame(tick);
    setTimeout(reveal, DUR+1500); // подстраховка, чтобы интро не зависло
  })();
  </script>
  <!-- ════════ /LOADER ════════ -->

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-inner">
      <div class="breadcrumb">
        <a href="index.html">Главная</a>
        <span>/</span>
        <span>Избранное</span>
      </div>
      <h1>ИЗБРАННОЕ</h1>
    </div>
  </div>

  <!-- Wishlist Content -->
  <div class="wishlist-page">
    <div id="wishlist-container">
      <!-- Загрузка -->
      <div style="text-align:center;padding:4rem;color:var(--gray-500)">Загрузка...</div>
    </div>
  </div>

  <!-- Footer -->

  <!-- Auth Modal -->
  <div id="modals-placeholder"></div>

  <script src="js/main.js"></script>
  <script>
  /* ── WISHLIST PAGE LOGIC ── */
  const SB_URL_W = 'https://dgyirginrefvjsbhhooi.supabase.co';

  // Ключи localStorage
  const WISHLIST_KEY = 'lining_wishlist';

  function getWishlist() {
    return JSON.parse(localStorage.getItem(WISHLIST_KEY) || '[]');
  }

  function saveWishlist(ids) {
    localStorage.setItem(WISHLIST_KEY, JSON.stringify(ids));
  }

  async function renderWishlist() {
    const container = document.getElementById('wishlist-container');
    const user = window.Auth?.getUser();
    if (!user) return;

    container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--gray-500)">Загружаем...</div>';

    try {
      const session = JSON.parse(localStorage.getItem('lining_session') || 'null');
      const token = session?.access_token || SB_KEY;
      
      const res = await fetch(
        `${SB_URL}/rest/v1/wishlists?user_id=eq.${user.id}&select=product_id`,
        { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}` } }
      );
      const data = await res.json();
      const productIds = data.map(w => w.product_id);

      if (!productIds.length) {
        container.innerHTML = `
          <div class="wishlist-empty">
            <div class="wishlist-empty-icon">♡</div>
            <div class="wishlist-empty-title">СПИСОК ПУСТ</div>
            <div class="wishlist-empty-sub">Добавляйте понравившиеся товары нажав ♡ на карточке</div>
            <a href="catalog.html" class="btn btn-primary" style="margin-top:1rem">Перейти в каталог</a>
          </div>`;
        return;
      }

      const productsRes = await fetch(
        `${SB_URL}/rest/v1/products?id=in.(${productIds.join(',')})&is_active=eq.true`,
        { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}` } }
      );
      const products = await productsRes.json();

      if (!products.length) {
        container.innerHTML = `
          <div class="wishlist-empty">
            <div class="wishlist-empty-icon">♡</div>
            <div class="wishlist-empty-title">СПИСОК ПУСТ</div>
            <a href="catalog.html" class="btn btn-primary" style="margin-top:1rem">Перейти в каталог</a>
          </div>`;
        return;
      }

      container.innerHTML = `
        <div class="wishlist-header">
          <div class="section-label">Мои желания</div>
          <div class="section-title">ИЗБРАННОЕ</div>
          <div class="wishlist-count">${products.length} ${products.length === 1 ? 'товар' : products.length < 5 ? 'товара' : 'товаров'}</div>
        </div>
        <div class="wishlist-grid">
          ${products.map(p => {
            const images = Array.isArray(p.images) ? p.images : [];
            const imgHtml = images[0]
              ? `<img src="${images[0]}" style="width:100%;height:100%;object-fit:cover">`
              : `<span style="font-size:5rem">👟</span>`;
            const oldPrice = p.old_price
              ? `<span class="old-price">${p.old_price.toLocaleString('ru-RU')}</span>` : '';
            return `
              <div class="product-card" style="position:relative" onclick="if(!event.target.closest('button')) window.location.href='product.html?id=${p.id}'">
                <button class="wishlist-remove-btn" onclick="event.stopPropagation();removeFromWishlist('${p.id}')" title="Убрать из избранного">♥</button>
                <div class="product-img-wrap">
                  <div class="product-img" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center">${imgHtml}</div>
                  <div class="product-actions">
                    <button class="btn-addcart" onclick="event.stopPropagation();addToCartFromWishlist('${p.id}','${p.name}',${p.price},'${images[0]||''}')">+ В корзину</button>
                  </div>
                </div>
                <div class="product-info">
                  <div class="product-brand">${p.brand || 'Li Ning'}</div>
                  <div class="product-name">${p.name}</div>
                  <div class="product-footer">
                    <div class="product-price">${oldPrice}${p.price.toLocaleString('ru-RU')} сум</div>
                    <div class="product-rating">★★★★★</div>
                  </div>
                </div>
              </div>`;
          }).join('')}
        </div>`;

    } catch(e) {
      console.error(e);
      container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--gray-500)">Ошибка загрузки</div>';
    }
  }

  async function removeFromWishlist(productId) {
    const user = window.Auth?.getUser();
    if (!user) return;
    const session = JSON.parse(localStorage.getItem('lining_session') || 'null');
    const token = session?.access_token || SB_KEY;
    await fetch(
      `${SB_URL}/rest/v1/wishlists?user_id=eq.${user.id}&product_id=eq.${productId}`,
      { method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}` } }
    );
    window.Toast?.show('Убрано из избранного', '', '');
    renderWishlist();
  }


  function addToCartFromWishlist(id, name, price, image) {
    window.Auth?.requireAuth(() => {
      window.Cart?.add({ id, name, price, size: '42', image, brand: 'Li Ning' });
    });
  }

  // При загрузке — проверяем авторизацию
  document.addEventListener('DOMContentLoaded', () => {
    // Ждём инициализации Auth
    setTimeout(() => {
      if (!window.Auth?.isLoggedIn()) {
        // Не вошёл — открываем модал, после входа остаёмся на этой странице
        window.Auth?.openModal('login');
      } else {
        renderWishlist();
      }
    }, 100);

    // Когда пользователь войдёт — рендерим список
    const origOnLogin = window.Auth?._onLogin;
    document.addEventListener('auth:login', () => renderWishlist());
  });
  </script>

</body>
