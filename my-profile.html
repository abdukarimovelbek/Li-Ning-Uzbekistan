<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Мой профиль — Li Ning Store</title>
  <link rel="stylesheet" href="css/styles.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8K29V08VJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8K29V08VJM');
  </script>
  <style>
    .mp-page { max-width: 600px; margin: 0 auto; padding: 2rem 1.2rem 5rem; }

    .mp-hero {
      text-align: center; padding: 2.5rem 1.5rem 2rem;
      background: var(--cream); border-radius: var(--radius-lg);
      margin-bottom: 1.2rem;
    }
    .mp-av {
      width: 84px; height: 84px; border-radius: 50%;
      background: var(--red); color: #fff;
      font-family: var(--font-display); font-size: 2rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 28px rgba(196,30,58,.35);
    }
    .mp-name {
      font-family: var(--font-display); font-size: 1.5rem;
      letter-spacing: 1px; color: var(--gray-900); margin-bottom: .2rem;
    }
    .mp-email { font-size: .82rem; color: var(--gray-500); }

    .mp-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: .9rem; margin-bottom: 1.2rem;
    }
    .mp-stat {
      background: var(--white); border: 1px solid var(--gray-100);
      border-radius: var(--radius-md); padding: 1.2rem;
      text-align: center; text-decoration: none; display: block;
      transition: box-shadow .2s;
    }
    .mp-stat:hover { box-shadow: var(--shadow-md); }
    .mp-stat-n {
      font-family: var(--font-display); font-size: 2.2rem;
      color: var(--red); line-height: 1;
    }
    .mp-stat-l {
      font-size: .68rem; color: var(--gray-500);
      text-transform: uppercase; letter-spacing: .1em; margin-top: .4rem;
    }

    .mp-section {
      background: var(--white); border: 1px solid var(--gray-100);
      border-radius: var(--radius-md); overflow: hidden; margin-bottom: 1rem;
    }
    .mp-lnk {
      display: flex; align-items: center; gap: .9rem;
      padding: .95rem 1.2rem; color: var(--gray-900); text-decoration: none;
      font-size: .88rem; font-weight: 500;
      border-bottom: 1px solid var(--gray-100); transition: background .15s;
    }
    .mp-lnk:last-child { border-bottom: none; }
    .mp-lnk:hover, .mp-lnk:active { background: var(--cream); }
    .mp-lnk svg { color: var(--gray-400); flex: none; }
    .mp-lnk-arr { margin-left: auto; color: var(--gray-300); }
    .mp-lnk-val { margin-left: auto; font-size: .8rem; color: var(--gray-500); font-weight: 400; }

    .mp-out {
      width: 100%; display: flex; align-items: center; justify-content: center;
      gap: .6rem; padding: 1rem; background: #FEF2F4; color: var(--red);
      border: none; border-radius: var(--radius-md); font-size: .88rem;
      font-weight: 700; cursor: pointer; margin-top: 1.2rem; transition: background .2s;
    }
    .mp-out:hover { background: #FDDDE2; }

    .mp-loading { text-align: center; padding: 4rem; color: var(--gray-400); }
  </style>
</head>

<body>
  <!-- ════════ LI-NING CINEMATIC LOADER ════════ -->
  <div id="ln-loader" aria-hidden="true">
    <div class="ln-load-stage">
      <img class="ln-load-logo" src="logo.jpg" alt="Li-Ning">
      <div class="ln-load-sub">Official Distributor · Uzbekistan</div>
    </div>
    <div class="ln-load-bar"><i></i></div>
    <div class="ln-load-meta">
      <div class="ln-load-num">0<small>%</small></div>
      <div class="ln-load-status">Подготовка коллекции</div>
    </div>
    <div class="ln-load-curtain"><span></span><span></span><span></span><span></span><span></span></div>
  </div>
  <style>
  #ln-loader{position:fixed;inset:0;z-index:99999;background:#141414;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
  #ln-loader.ln-done{pointer-events:none}
  .ln-load-stage{position:relative;text-align:center;z-index:2}
  .ln-load-logo{height:clamp(46px,7vw,78px);width:auto;filter:invert(1) brightness(1.6);display:block;margin:0 auto;clip-path:inset(0 100% 0 0);opacity:0}
  .ln-load-sub{margin-top:1.4rem;font-size:.7rem;letter-spacing:.5em;text-transform:uppercase;color:rgba(255,255,255,.5);padding-left:.5em;opacity:0;transform:translateY(8px)}
  .ln-load-bar{position:absolute;left:7vw;right:7vw;bottom:7%;height:2px;background:rgba(255,255,255,.12);z-index:2}
  .ln-load-bar i{display:block;height:100%;width:0;background:#C41E3A;box-shadow:0 0 12px #C41E3A;transition:width .1s linear}
  .ln-load-meta{position:absolute;left:0;right:0;bottom:9%;display:flex;align-items:flex-end;justify-content:space-between;padding:0 7vw;z-index:2}
  .ln-load-num{font-family:'Bebas Neue','Oswald',sans-serif;font-size:clamp(3rem,9vw,7rem);line-height:.8;color:#fff;letter-spacing:2px}
  .ln-load-num small{font-size:.32em;vertical-align:super;color:#C41E3A}
  .ln-load-status{font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;text-align:right;max-width:45%}
  .ln-load-curtain{position:absolute;inset:0;z-index:5;display:flex;pointer-events:none}
  .ln-load-curtain span{flex:1;background:#141414;transform:translateY(0)}
  @media(prefers-reduced-motion:reduce){#ln-loader{display:none!important}}
  </style>
  <script>
  (function(){
    var L=document.getElementById('ln-loader'); if(!L) return;
    if(sessionStorage.getItem('ln_intro_seen')){ L.parentNode.removeChild(L); return; }
    var logo=L.querySelector('.ln-load-logo'), sub=L.querySelector('.ln-load-sub'),
        bar=L.querySelector('.ln-load-bar i'), num=L.querySelector('.ln-load-num'),
        status=L.querySelector('.ln-load-status'), curtain=L.querySelector('.ln-load-curtain');
    var statuses=['Подготовка коллекции','Загрузка витрины','Полировка пикселей','Почти готово'];
    document.documentElement.style.overflow='hidden';
    setTimeout(function(){ logo.style.transition='clip-path 1.1s cubic-bezier(.76,0,.24,1),opacity .5s'; logo.style.clipPath='inset(0 0 0 0)'; logo.style.opacity='1'; },150);
    setTimeout(function(){ sub.style.transition='opacity .8s,transform .8s cubic-bezier(.22,1,.36,1)'; sub.style.opacity='1'; sub.style.transform='none'; },700);
    var t0=performance.now(), DUR=2000, done=false;
    function reveal(){
      if(done) return; done=true;
      sessionStorage.setItem('ln_intro_seen','1');
      document.documentElement.style.overflow='';
      [].forEach.call(curtain.children,function(s,i){ s.style.transition='transform .75s cubic-bezier(.76,0,.24,1) '+(i*0.07)+'s'; s.style.transform='translateY(-101%)'; });
      setTimeout(function(){ L.classList.add('ln-done'); L.style.transition='opacity .3s'; L.style.opacity='0'; },300);
      setTimeout(function(){ if(L.parentNode) L.parentNode.removeChild(L); },1150);
    }
    function tick(now){
      var p=Math.min((now-t0)/DUR,1), e=1-Math.pow(1-p,3), v=Math.round(e*100);
      num.firstChild.nodeValue=v; bar.style.width=v+'%';
      status.textContent=statuses[Math.min(3,Math.floor(p*4))];
      if(p<1) requestAnimationFrame(tick); else setTimeout(reveal,260);
    }
    requestAnimationFrame(tick);
    setTimeout(reveal, DUR+1500);
  })();
  </script>
  <!-- ════════ /LOADER ════════ -->

  <div id="navbar-placeholder"></div>

  <div class="page-header">
    <div class="page-header-inner">
      <div class="breadcrumb">
        <a href="index.html">Главная</a><span>/</span><span>Мой профиль</span>
      </div>
      <h1>МОЙ ПРОФИЛЬ</h1>
    </div>
  </div>

  <div class="mp-page" id="mp-page">
    <div class="mp-loading">Загрузка...</div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    let attempts = 0;
    const MAX_ATTEMPTS = 50;
    const tryLoad = () => {
      attempts++;
      if (!document.getElementById('auth-btn')) {
        if (attempts >= MAX_ATTEMPTS) {
          document.getElementById('mp-page').innerHTML =
            '<div class="mp-loading">Ошибка загрузки страницы. Обновите страницу.</div>';
          return;
        }
        setTimeout(tryLoad, 100);
        return;
      }
      if (!window.Auth?.isLoggedIn()) {
        window.Auth?.openModal('login');
        document.getElementById('mp-page').innerHTML =
          '<div class="mp-loading">Войдите в аккаунт для просмотра профиля</div>';
      } else {
        loadProfile();
      }
    };
    tryLoad();
    document.addEventListener('auth:login', loadProfile);
  });

  async function loadProfile() {
    const user = window.Auth?.getUser();
    if (!user) return;

    const name  = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Пользователь';
    const email = user.email || '';
    const initials = name.split(' ').map(w => w[0]).filter(Boolean).join('').toUpperCase().slice(0, 2) || '?';

    const [ordersByEmail, ordersByUserId, wishlistCount, profile] = await Promise.all([
      fetchCount(`${SB_URL}/rest/v1/orders?email=eq.${encodeURIComponent(email)}&select=id`),
      fetchCount(`${SB_URL}/rest/v1/orders?user_id=eq.${user.id}&select=id`),
      fetchCount(`${SB_URL}/rest/v1/wishlists?user_id=eq.${user.id}&select=id`),
      fetchOne(`${SB_URL}/rest/v1/profiles?id=eq.${user.id}&select=*`)
    ]);
    const ordersCount = Math.max(ordersByEmail, ordersByUserId);

    const phone = profile?.phone || '—';

    document.getElementById('mp-page').innerHTML = `
      <div class="mp-hero">
        <div class="mp-av">${initials}</div>
        <div class="mp-name">${name}</div>
        <div class="mp-email">${email}</div>
      </div>

      <div class="mp-stats">
        <a href="my-orders.html" class="mp-stat">
          <div class="mp-stat-n">${ordersCount}</div>
          <div class="mp-stat-l">Заказов</div>
        </a>
        <a href="wishlist.html" class="mp-stat">
          <div class="mp-stat-n">${wishlistCount}</div>
          <div class="mp-stat-l">В избранном</div>
        </a>
      </div>

      <div class="mp-section">
        <a href="my-orders.html" class="mp-lnk">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
          Мои заказы
          <svg class="mp-lnk-arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </a>
        <a href="wishlist.html" class="mp-lnk">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Избранное
          <svg class="mp-lnk-arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </a>
        <a href="#" class="mp-lnk">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
          Мои карты
          <svg class="mp-lnk-arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      </div>

      <div class="mp-section">
        <div class="mp-lnk" style="cursor:default">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.64 3.45 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6.07 6.07l1-1.15c.535-.56 1.34-.75 2.11-.45.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Номер телефона
          <span class="mp-lnk-val">${phone}</span>
        </div>
        <div class="mp-lnk" style="cursor:default">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Email
          <span class="mp-lnk-val">${email}</span>
        </div>
      </div>

      <button class="mp-out" onclick="window.Auth?.signOut().then(()=>window.location.href='index.html')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Выйти из аккаунта
      </button>
    `;
  }

  async function fetchCount(url) {
    try {
      const res = await fetch(url, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
      const d = await res.json();
      return Array.isArray(d) ? d.length : 0;
    } catch { return 0; }
  }

  async function fetchOne(url) {
    try {
      const res = await fetch(url, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
      const d = await res.json();
      return d?.[0] || null;
    } catch { return null; }
  }
  </script>

  <div id="modals-placeholder"></div>
</body>
</html>
