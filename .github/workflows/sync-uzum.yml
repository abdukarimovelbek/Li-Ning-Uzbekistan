name: Sync Uzum → Supabase

on:
  # Запускать каждые 6 часов автоматически
  schedule:
    - cron: '0 */6 * * *'
  # Или вручную из GitHub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Uzum → Supabase sync
        env:
          UZUM_TOKEN:   ${{ secrets.UZUM_TOKEN }}
          UZUM_SHOP_ID: ${{ secrets.UZUM_SHOP_ID }}
          SB_URL:       ${{ secrets.SB_URL }}
          SB_KEY:       ${{ secrets.SB_KEY }}
        run: node sync-uzum.js
