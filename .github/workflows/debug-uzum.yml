name: Debug Uzum API Structure

"on":
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test Public Uzum API
        run: |
          node -e "
          const productId = 1530792;

          async function main() {
            const res = await fetch('https://api.uzum.uz/api/product/' + productId, {
              headers: { 'Accept-Language': 'ru-RU', 'Accept': 'application/json' }
            });
            const data = await res.json();
            const p = data?.payload;

            console.log('=== КЛЮЧИ payload ===');
            console.log(Object.keys(p || {}).join(', '));

            // Ищем всё что связано с фото
            const photoFields = Object.entries(p || {}).filter(([k,v]) =>
              k.toLowerCase().includes('photo') ||
              k.toLowerCase().includes('image') ||
              k.toLowerCase().includes('media') ||
              k.toLowerCase().includes('gallery') ||
              (Array.isArray(v) && JSON.stringify(v).includes('uzum'))
            );
            console.log('\n=== ПОЛЯ С ФОТО/МЕДИА ===');
            photoFields.forEach(([k,v]) => console.log(k + ':', JSON.stringify(v)));

            console.log('\n=== КЛЮЧИ ПЕРВОГО SKU ===');
            const sku0 = p?.skuList?.[0];
            if (sku0) {
              console.log(Object.keys(sku0).join(', '));
              const skuPhotos = Object.entries(sku0).filter(([k,v]) =>
                k.toLowerCase().includes('photo') ||
                k.toLowerCase().includes('image') ||
                (Array.isArray(v) && JSON.stringify(v).includes('uzum'))
              );
              console.log('\n=== ФОТО В ПЕРВОМ SKU ===');
              skuPhotos.forEach(([k,v]) => console.log(k + ':', JSON.stringify(v)));
            }
          }

          main().catch(console.error);
          "
