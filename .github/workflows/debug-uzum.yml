name: Debug Uzum API Structure

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check Uzum API fields
        env:
          UZUM_TOKEN:   ${{ secrets.UZUM_TOKEN }}
          UZUM_SHOP_ID: ${{ secrets.UZUM_SHOP_ID }}
        run: |
      - name: Check Uzum API fields
        env:
          UZUM_TOKEN:   ${{ secrets.UZUM_TOKEN }}
          UZUM_SHOP_ID: ${{ secrets.UZUM_SHOP_ID }}
        run: |
          node -e "
          const token   = process.env.UZUM_TOKEN || '';
          const shopId  = process.env.UZUM_SHOP_ID || '';
          console.log('TOKEN длина:', token.length, '| начало:', token.substring(0,10));
          console.log('SHOP_ID:', shopId);

          const UZUM_API = 'https://api-seller.uzum.uz/api/seller-openapi';
          const FILTERS  = ['IN_STOCK','ACTIVE','INACTIVE'];

          async function tryFilter(filter) {
            const url = UZUM_API + '/v1/product/shop/' + shopId + '?page=0&size=1&filter=' + filter + '&order=ASC&sortBy=DEFAULT&productRank=A';
            console.log('\nПробуем фильтр:', filter);
            const res = await fetch(url, {
              headers: {
                'Authorization': token,
                'Content-Type': 'application/json',
                'Accept': 'application/json',
                'Accept-Language': 'ru-RU',
              }
            });
            const data = await res.json();
            const items = data?.productList || data?.payload?.products || data?.products || data?.content || [];
            if (items.length) {
              const item = items[0];
              console.log('НАЙДЕН товар:', item.title || item.name || '???');
              console.log('КЛЮЧИ верхнего уровня:', Object.keys(item).join(', '));
              console.log('КЛЮЧИ первого SKU:', Object.keys(item.skuList?.[0] || {}).join(', '));
              console.log('ПЕРВЫЙ SKU:', JSON.stringify(item.skuList?.[0], null, 2));
              console.log('ТОВАР без skuList:', JSON.stringify({...item, skuList:'[скрыто]'}, null, 2));
            } else {
              console.log('Товаров нет, ответ:', JSON.stringify(data).substring(0, 300));
            }
          }

          (async () => {
            for (const f of FILTERS) await tryFilter(f);
          })().catch(console.error);
          "