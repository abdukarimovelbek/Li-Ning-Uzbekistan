name: Debug Uzum API Structure

"on":
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test Public Uzum API
        run: |
          node -e "
          async function tryUrl(label, url) {
            try {
              const res = await fetch(url, {
                headers: { 'Accept': 'application/json', 'Accept-Language': 'ru-RU' }
              });
              const text = await res.text();
              console.log(label, '→', res.status, ':', text.substring(0, 600));
              console.log('---');
            } catch(e) { console.log(label, '→ ошибка:', e.message); }
          }

          (async () => {
            // Ищем продукт через публичный поиск
            await tryUrl('search ABFT027', 'https://api.uzum.uz/api/v2/main/search?query=ABFT027&size=1');
            await tryUrl('search v1',      'https://api.uzum.uz/api/main/search?text=ABFT027&size=1');
            await tryUrl('catalog search', 'https://api.uzum.uz/api/v1/search?query=ABFT027&size=1');

            // Пробуем разные форматы public product endpoint
            await tryUrl('product web',    'https://api.uzum.uz/api/web/product/1530792');
            await tryUrl('product v2',     'https://api.uzum.uz/api/v2/product/1530792');
            await tryUrl('product catalog','https://api.uzum.uz/api/catalog/product/1530792');
          })().catch(console.error);
          "


