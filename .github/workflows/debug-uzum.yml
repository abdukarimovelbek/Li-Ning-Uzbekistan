name: Debug Uzum API Structure

"on":
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test Public Uzum API
        run: |
          node -e "
          const productId = 1530792;

          async function tryUrl(label, url, opts) {
            try {
              const res = await fetch(url, opts || {});
              console.log(label, '→ статус:', res.status);
              if (res.status === 200) {
                const data = await res.json();
                const d = data?.payload || data?.data || data;
                console.log('  Ключи:', Object.keys(d || {}).join(', '));
                const photoFields = Object.entries(d || {}).filter(([k,v]) =>
                  k.toLowerCase().includes('photo') ||
                  k.toLowerCase().includes('image') ||
                  k.toLowerCase().includes('media') ||
                  (Array.isArray(v) && JSON.stringify(v).includes('uzum'))
                );
                if (photoFields.length) {
                  console.log('  === ФОТО ===');
                  photoFields.forEach(([k,v]) => console.log('  ' + k + ':', JSON.stringify(v).substring(0, 300)));
                }
              } else {
                const text = await res.text();
                console.log('  Ответ:', text.substring(0, 200));
              }
            } catch(e) { console.log(label, '→ ошибка:', e.message); }
          }

          (async () => {
            await tryUrl('Public API v1', 'https://api.uzum.uz/api/v1/product/' + productId);
            await tryUrl('Public API main', 'https://api.uzum.uz/api/main/product/' + productId);
            await tryUrl('Public API product', 'https://api.uzum.uz/api/product/' + productId);
            await tryUrl('Public API item', 'https://api.uzum.uz/api/item/' + productId);
          })().catch(console.error);
          "
