  <style>
    .orders-page { padding: 3rem 2rem 5rem; max-width: 900px; margin: 0 auto; }
    .order-card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
      overflow: hidden;
      transition: box-shadow var(--transition);
    }
    .order-card:hover { box-shadow: var(--shadow-md); }
    .order-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.5rem;
      background: var(--cream);
      border-bottom: 1px solid var(--gray-100);
    }
    .order-card-id { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 1px; color: var(--gray-900); }
    .order-card-date { font-size: 0.75rem; color: var(--gray-500); margin-top: 0.2rem; }
    .order-card-status {
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .status-new { background: rgba(184,134,11,0.1); color: var(--gold); }
    .status-processing { background: rgba(59,130,246,0.1); color: #3b82f6; }
    .status-delivered { background: rgba(34,197,94,0.1); color: #22c55e; }
    .status-cancelled { background: rgba(196,30,58,0.1); color: var(--red); }
    .order-card-items { padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
    .order-card-item { display: flex; align-items: center; gap: 1rem; }
    .order-card-item-img {
      width: 56px; height: 56px; flex-shrink: 0;
      background: var(--gray-100); border-radius: var(--radius-sm);
      overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }
    .order-card-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .order-card-item-name { font-size: 0.88rem; font-weight: 600; color: var(--gray-900); }
    .order-card-item-meta { font-size: 0.75rem; color: var(--gray-500); margin-top: 0.15rem; }
    .order-card-item-price { margin-left: auto; font-family: var(--font-display); font-size: 1rem; color: var(--gray-900); white-space: nowrap; }
    .order-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--gray-100);
      background: var(--cream);
    }
    .order-card-total-label { font-size: 0.75rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 1px; }
    .order-card-total { font-family: var(--font-display); font-size: 1.4rem; color: var(--red); }
    .orders-empty {
      text-align: center; padding: 5rem 2rem;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }
    .orders-empty-icon { font-size: 4rem; }
    .orders-empty-title { font-family: var(--font-display); font-size: 2rem; letter-spacing: 2px; }
    .orders-empty-sub { font-size: 0.9rem; color: var(--gray-500); }
  </style>

  <!-- ════════ LI-NING CINEMATIC LOADER — Ink ════════ -->
  <div id="ln-loader" aria-hidden="true">
    <div class="ln-load-stage">
      <img class="ln-load-logo" src="logo.jpg" alt="Li-Ning">
      <div class="ln-load-sub">Official Distributor · Uzbekistan</div>

    <div class="ln-load-bar"><i></i></div>
    <div class="ln-load-meta">
      <div class="ln-load-num">0<small>%</small></div>
      <div class="ln-load-status">Подготовка коллекции</div>
    </div>
    <div class="ln-load-curtain"><span></span><span></span><span></span><span></span><span></span></div>

  <style>
  #ln-loader{position:fixed;inset:0;z-index:99999;background:#141414;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
  #ln-loader.ln-done{pointer-events:none}
  .ln-load-stage{position:relative;text-align:center;z-index:2}
  .ln-load-logo{height:clamp(46px,7vw,78px);width:auto;filter:invert(1) brightness(1.6);display:block;margin:0 auto;clip-path:inset(0 100% 0 0);opacity:0}
  .ln-load-sub{margin-top:1.4rem;font-size:.7rem;letter-spacing:.5em;text-transform:uppercase;color:rgba(255,255,255,.5);padding-left:.5em;opacity:0;transform:translateY(8px)}
  .ln-load-bar{position:absolute;left:7vw;right:7vw;bottom:7%;height:2px;background:rgba(255,255,255,.12);z-index:2}
  .ln-load-bar i{display:block;height:100%;width:0;background:#C41E3A;box-shadow:0 0 12px #C41E3A;transition:width .1s linear}
  .ln-load-meta{position:absolute;left:0;right:0;bottom:9%;display:flex;align-items:flex-end;justify-content:space-between;padding:0 7vw;z-index:2}
  .ln-load-num{font-family:'Bebas Neue','Oswald',sans-serif;font-size:clamp(3rem,9vw,7rem);line-height:.8;color:#fff;letter-spacing:2px}
  .ln-load-num small{font-size:.32em;vertical-align:super;color:#C41E3A}
  .ln-load-status{font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;text-align:right;max-width:45%}
  .ln-load-curtain{position:absolute;inset:0;z-index:5;display:flex;pointer-events:none}
  .ln-load-curtain span{flex:1;background:#141414;transform:translateY(0)}
  @media(prefers-reduced-motion:reduce){#ln-loader{display:none!important}}
  </style>
  <script>
  (function(){
    var L=document.getElementById('ln-loader'); if(!L) return;
    if(sessionStorage.getItem('ln_intro_seen')){ L.parentNode.removeChild(L); return; }
    var logo=L.querySelector('.ln-load-logo'), sub=L.querySelector('.ln-load-sub'),
        bar=L.querySelector('.ln-load-bar i'), num=L.querySelector('.ln-load-num'),
        status=L.querySelector('.ln-load-status'), curtain=L.querySelector('.ln-load-curtain');
    var statuses=['Подготовка коллекции','Загрузка витрины','Полировка пикселей','Почти готово'];
    document.documentElement.style.overflow='hidden';
    setTimeout(function(){ logo.style.transition='clip-path 1.1s cubic-bezier(.76,0,.24,1),opacity .5s'; logo.style.clipPath='inset(0 0 0 0)'; logo.style.opacity='1'; },150);
    setTimeout(function(){ sub.style.transition='opacity .8s,transform .8s cubic-bezier(.22,1,.36,1)'; sub.style.opacity='1'; sub.style.transform='none'; },700);
    var t0=performance.now(), DUR=2000, done=false;
    function reveal(){
      if(done) return; done=true;
      sessionStorage.setItem('ln_intro_seen','1');
      document.documentElement.style.overflow='';
      [].forEach.call(curtain.children,function(s,i){ s.style.transition='transform .75s cubic-bezier(.76,0,.24,1) '+(i*0.07)+'s'; s.style.transform='translateY(-101%)'; });
      setTimeout(function(){ L.classList.add('ln-done'); L.style.transition='opacity .3s'; L.style.opacity='0'; },300);
      setTimeout(function(){ if(L.parentNode) L.parentNode.removeChild(L); },1150);
    }
    function tick(now){
      var p=Math.min((now-t0)/DUR,1), e=1-Math.pow(1-p,3), v=Math.round(e*100);
      num.firstChild.nodeValue=v; bar.style.width=v+'%';
      status.textContent=statuses[Math.min(3,Math.floor(p*4))];
      if(p<1) requestAnimationFrame(tick); else setTimeout(reveal,260);
    }
    requestAnimationFrame(tick);
    setTimeout(reveal, DUR+1500); // подстраховка, чтобы интро не зависло
  })();
  </script>

  <script>

  document.addEventListener('DOMContentLoaded', () => {
    const flags = JSON.parse(localStorage.getItem('site_flags') || '{}');
    if (!flags.orders_enabled) {
      showFeatureDisabledModal('orders');
    }
  });

  const statusMap = {
    'new':        { label: 'Новый',     cls: 'status-new' },
    'processing': { label: 'В работе',  cls: 'status-processing' },
    'delivered':  { label: 'Доставлен', cls: 'status-delivered' },
    'cancelled':  { label: 'Отменён',   cls: 'status-cancelled' },
  };

  async function loadMyOrders() {
    const container = document.getElementById('orders-container');
    const user = window.Auth?.getUser();
    if (!user) return;

    container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--gray-500)">Загрузка заказов...</div>';

    try {
      // Ищем заказы по email пользователя
      const email = user.email;
      const res = await fetch(
        `${SB_URL}/rest/v1/orders?email=eq.${encodeURIComponent(email)}&order=created_at.desc`,
        { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }
      );
      const orders = await res.json();

      if (!orders.length) {
        container.innerHTML = `
          <div class="orders-empty">
            <div class="orders-empty-icon">📦</div>
            <div class="orders-empty-title">ЗАКАЗОВ НЕТ</div>
            <div class="orders-empty-sub">Вы ещё не делали заказов</div>
            <a href="catalog.html" class="btn btn-primary" style="margin-top:1rem">Перейти в каталог →</a>
          </div>`;
        return;
      }

      container.innerHTML = `
        <div style="margin-bottom:2rem">
          <div class="section-label">История покупок</div>
          <div class="section-title">МОИ ЗАКАЗЫ</div>
          <div style="font-size:0.82rem;color:var(--gray-500);margin-top:0.3rem">${orders.length} ${orders.length === 1 ? 'заказ' : orders.length < 5 ? 'заказа' : 'заказов'}</div>
        </div>
        ${orders.map(order => {
          const items = Array.isArray(order.items) ? order.items : [];
          const date = new Date(order.created_at).toLocaleDateString('ru-RU', {
            day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
          });
          const status = statusMap[order.status] || { label: order.status, cls: 'status-new' };
          const shortId = order.id?.slice(0, 8).toUpperCase();
          return `
            <div class="order-card">
              <div class="order-card-header">
                <div>
                  <div class="order-card-id">Заказ #${shortId}</div>
                  <div class="order-card-date">${date}</div>
                </div>
                <span class="order-card-status ${status.cls}">${status.label}</span>
              </div>
              <div class="order-card-items">
                ${items.slice(0, 3).map(item => `
                  <div class="order-card-item">
                    <div class="order-card-item-img">
                      ${item.image ? `<img src="${item.image}">` : '👟'}
                    </div>
                    <div style="flex:1">
                      <div class="order-card-item-name">${item.name}</div>
                      <div class="order-card-item-meta">Размер: ${item.size} · ${item.quantity} шт.</div>
                    </div>
                    <div class="order-card-item-price">${(item.price * item.quantity).toLocaleString('ru-RU')} сум</div>
                  </div>`).join('')}
                ${items.length > 3 ? `<div style="font-size:0.75rem;color:var(--gray-500);text-align:center;padding:0.5rem 0">+ ещё ${items.length - 3} товара</div>` : ''}
              </div>
              <div class="order-card-footer">
                <span class="order-card-total-label">Итого</span>
                <span class="order-card-total">${(order.total||0).toLocaleString('ru-RU')} сум</span>
              </div>
            </div>`;
        }).join('')}`;
    } catch(e) {
      console.error(e);
      container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--gray-500)">Ошибка загрузки заказов</div>';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      if (!window.Auth?.isLoggedIn()) {
        window.Auth?.openModal('login');
      } else {
        loadMyOrders();
      }
    }, 100);
  });
  </script>

  <!-- ════════ LI-NING MOTION (reveal + progress) ════════ -->
  <script>
  (function(){
    if(matchMedia('(prefers-reduced-motion:reduce)').matches) return;
    document.documentElement.classList.add('ln-mo');

    // прогресс-бар
    var bar=document.createElement('div'); bar.className='ln-prog'; document.body.appendChild(bar);
    function prog(){ var h=document.documentElement.scrollHeight-innerHeight; bar.style.width=(h>0?(scrollY/h*100):0)+'%'; }

    // ЧТО анимируем (настраивай список под себя; product-card НЕ трогаем — у него свой card-animate)
    var SEL='.section-label,.section-title,.section-head,.see-all,.reviews-summary,.review-card,.store-card,.wishlist-header,.breadcrumb';
    var els=[].slice.call(document.querySelectorAll(SEL));
    els.forEach(function(el){ el.classList.add('ln-rev'); });

    function show(el){ el.classList.add('in'); }
    function inView(el){ var r=el.getBoundingClientRect(); return r.top<innerHeight*0.92 && r.bottom>-40; }

    var io=('IntersectionObserver' in window) ? new IntersectionObserver(function(es){
      es.forEach(function(e){ if(e.isIntersecting){ show(e.target); io.unobserve(e.target); } });
    },{threshold:.12, rootMargin:'0px 0px -7% 0px'}) : null;

    els.forEach(function(el){ if(inView(el)) show(el); else if(io) io.observe(el); });

    // ручной фолбэк (если IO недоступен/притормозил) + обновление прогресса
    function onScroll(){ prog(); els.forEach(function(el){ if(!el.classList.contains('in') && inView(el)){ show(el); if(io) io.unobserve(el); } }); }
    addEventListener('scroll', onScroll, {passive:true});
    prog();
    setTimeout(onScroll, 1200);   // подстраховка
    addEventListener('load', onScroll);
  })();
  </script>
  <!-- ════════ /MOTION ════════ -->

  <!-- ════════ LI-NING PAGE WIPE ════════ -->
  <script>
  (function(){
    if(matchMedia('(prefers-reduced-motion:reduce)').matches) return;
    var w=document.createElement('div'); w.className='ln-wipe';
    w.innerHTML='<span></span><span></span><span></span><span></span><span></span><div class="ln-wipe-logo"><img src="logo.jpg" alt=""></div>';
    document.body.appendChild(w);
    var panels=[].slice.call(w.querySelectorAll('span')), logo=w.querySelector('.ln-wipe-logo');

    // приехали на страницу через wipe → раскрываем шторку
    if(sessionStorage.getItem('ln_wipe_in')){
      sessionStorage.removeItem('ln_wipe_in');
      panels.forEach(function(s){ s.style.transition='none'; s.style.transformOrigin='top'; s.style.transform='scaleY(1)'; });
      logo.style.opacity='1';
      requestAnimationFrame(function(){ requestAnimationFrame(function(){
        logo.style.transition='opacity .3s'; logo.style.opacity='0';
        panels.forEach(function(s,i){ s.style.transition='transform .5s cubic-bezier(.76,0,.24,1) '+(i*0.05)+'s'; s.style.transform='scaleY(0)'; });
      });});
    }

    function leave(href){
      sessionStorage.setItem('ln_wipe_in','1');
      panels.forEach(function(s,i){ s.style.transformOrigin='bottom'; s.style.transition='transform .42s cubic-bezier(.76,0,.24,1) '+(i*0.05)+'s'; s.style.transform='scaleY(1)'; });
      logo.style.transition='opacity .3s ease .15s'; logo.style.opacity='1';
      setTimeout(function(){ location.href=href; }, 560);
    }

    document.addEventListener('click', function(e){
      if(e.defaultPrevented || e.button!==0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      if(e.target.closest('button,[data-no-wipe]')) return;           // клики по кнопкам (корзина/❤/размеры) — без шторки
      var a=e.target.closest('a[href]'); if(!a) return;
      if(a.target==='_blank' || a.hasAttribute('download')) return;
      var href=a.getAttribute('href');
      if(!href || href.charAt(0)==='#' || /^(javascript:|mailto:|tel:)/i.test(href)) return;
      var url; try{ url=new URL(href, location.href); }catch(_){ return; }
      if(url.origin!==location.origin) return;                        // внешние ссылки (Telegram/Instagram) — обычный переход
      if(url.pathname===location.pathname && url.search===location.search) return; // та же страница
      e.preventDefault(); leave(url.href);
    }, true);
  })();
  </script>
  <!-- ════════ /PAGE WIPE ════════ -->

  <!-- ════════ LI-NING: word-reveal + count-up ════════ -->
  <script>
  (function(){
    if(matchMedia('(prefers-reduced-motion:reduce)').matches) return;

    /* ── 1. Заголовок по словам ── */
    function lnWords(el){
      if(!el || el.dataset.lnW) return; el.dataset.lnW='1';
      var units=[];
      [].forEach.call(el.childNodes,function(n){
        if(n.nodeType===3){ n.textContent.split(/(\s+)/).forEach(function(t){ units.push(t.trim()===''?{sp:t}:{word:t}); }); }
        else if(n.nodeType===1){ n.tagName==='BR' ? units.push({br:1}) : units.push({el:n}); }
      });
      el.innerHTML=''; var i=0;
      units.forEach(function(u){
        if(u.sp!=null){ el.appendChild(document.createTextNode(u.sp)); return; }
        if(u.br){ el.appendChild(document.createElement('br')); return; }
        var w=document.createElement('span'); w.className='ln-w';
        var inner=document.createElement('i'); inner.style.setProperty('--d',(i*0.07)+'s');
        if(u.word!=null) inner.textContent=u.word; else inner.appendChild(u.el);
        w.appendChild(inner); el.appendChild(w); i++;
      });
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ el.classList.add('in'); }); });
    }
    window.lnWords=lnWords;
    [].forEach.call(document.querySelectorAll('.ln-words'), lnWords);

    /* ── 2. Count-up для цифр ── */
    function lnCount(el){
      if(el.dataset.lnC) return; el.dataset.lnC='1';
      var target=parseFloat(el.getAttribute('data-count'))||0,
          dec=parseInt(el.getAttribute('data-dec')||'0',10),
          pre=el.getAttribute('data-pre')||'', suf=el.getAttribute('data-suf')||'',
          t0=performance.now(), DUR=1400;
      function fmt(v){ return dec ? v.toFixed(dec) : Math.round(v).toLocaleString('ru-RU'); }
      function tk(now){ var p=Math.min((now-t0)/DUR,1), e=1-Math.pow(1-p,3);
        el.textContent=pre+fmt(target*e)+suf;
        if(p<1) requestAnimationFrame(tk); else el.textContent=pre+fmt(target)+suf;
      }
      requestAnimationFrame(tk);
    }
    var counters=[].slice.call(document.querySelectorAll('[data-count]'));
    function inView(el){ var r=el.getBoundingClientRect(); return r.top<innerHeight*0.9 && r.bottom>0; }
    var io=('IntersectionObserver' in window)?new IntersectionObserver(function(es){
      es.forEach(function(e){ if(e.isIntersecting){ lnCount(e.target); io.unobserve(e.target);} });
    },{threshold:.3}):null;
    counters.forEach(function(el){ if(inView(el)) lnCount(el); else if(io) io.observe(el); else lnCount(el); });
    addEventListener('scroll',function(){ counters.forEach(function(el){ if(!el.dataset.lnC && inView(el)) lnCount(el); }); },{passive:true});
  })();
  </script>
  <!-- ════════ /WORD-REVEAL ════════ -->
