<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Мои заказы — Li Ning Store</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8K29V08VJM"></script>
  
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8K29V08VJM');
  </script> 
  
  <style>
    .orders-page { padding: 3rem 2rem 5rem; max-width: 900px; margin: 0 auto; }
    .order-card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
      overflow: hidden;
      transition: box-shadow var(--transition);
    }
    .order-card:hover { box-shadow: var(--shadow-md); }
    .order-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.5rem;
      background: var(--cream);
      border-bottom: 1px solid var(--gray-100);
    }
    .order-card-id { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 1px; color: var(--gray-900); }
    .order-card-date { font-size: 0.75rem; color: var(--gray-500); margin-top: 0.2rem; }
    .order-card-status {
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .status-new { background: rgba(184,134,11,0.1); color: var(--gold); }
    .status-processing { background: rgba(59,130,246,0.1); color: #3b82f6; }
    .status-delivered { background: rgba(34,197,94,0.1); color: #22c55e; }
    .status-cancelled { background: rgba(196,30,58,0.1); color: var(--red); }
    .order-card-items { padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
    .order-card-item { display: flex; align-items: center; gap: 1rem; }
    .order-card-item-img {
      width: 56px; height: 56px; flex-shrink: 0;
      background: var(--gray-100); border-radius: var(--radius-sm);
      overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }
    .order-card-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .order-card-item-name { font-size: 0.88rem; font-weight: 600; color: var(--gray-900); }
    .order-card-item-meta { font-size: 0.75rem; color: var(--gray-500); margin-top: 0.15rem; }
    .order-card-item-price { margin-left: auto; font-family: var(--font-display); font-size: 1rem; color: var(--gray-900); white-space: nowrap; }
    .order-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--gray-100);
      background: var(--cream);
    }
    .order-card-total-label { font-size: 0.75rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 1px; }
    .order-card-total { font-family: var(--font-display); font-size: 1.4rem; color: var(--red); }
    .orders-empty {
      text-align: center; padding: 5rem 2rem;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }
    .orders-empty-icon { font-size: 4rem; }
    .orders-empty-title { font-family: var(--font-display); font-size: 2rem; letter-spacing: 2px; }
    .orders-empty-sub { font-size: 0.9rem; color: var(--gray-500); }
  </style>
</head>

<body>
  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-inner">
      <div class="breadcrumb">
        <a href="index.html">Главная</a><span>/</span><span>Мои заказы</span>
      </div>
      <h1>МОИ ЗАКАЗЫ</h1>
    </div>
  </div>

  <div class="orders-page">
    <div id="orders-container">
      <div style="text-align:center;padding:4rem;color:var(--gray-500)">Загрузка...</div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script>

  document.addEventListener('DOMContentLoaded', () => {
    const flags = JSON.parse(localStorage.getItem('site_flags') || '{}');
    if (!flags.orders_enabled) {
      showFeatureDisabledModal('orders');
    }
  });

  const statusMap = {
    'new':        { label: 'Новый',     cls: 'status-new' },
    'processing': { label: 'В работе',  cls: 'status-processing' },
    'delivered':  { label: 'Доставлен', cls: 'status-delivered' },
    'cancelled':  { label: 'Отменён',   cls: 'status-cancelled' },
  };

  async function loadMyOrders() {
    const container = document.getElementById('orders-container');
    const user = window.Auth?.getUser();
    if (!user) return;

    container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--gray-500)">Загрузка заказов...</div>';

    try {
      // Ищем заказы по email пользователя
      const email = user.email;
      const res = await fetch(
        `${SB_URL}/rest/v1/orders?email=eq.${encodeURIComponent(email)}&order=created_at.desc`,
        { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }
      );
      const orders = await res.json();

      if (!orders.length) {
        container.innerHTML = `
          <div class="orders-empty">
            <div class="orders-empty-icon">📦</div>
            <div class="orders-empty-title">ЗАКАЗОВ НЕТ</div>
            <div class="orders-empty-sub">Вы ещё не делали заказов</div>
            <a href="catalog.html" class="btn btn-primary" style="margin-top:1rem">Перейти в каталог →</a>
          </div>`;
        return;
      }

      container.innerHTML = `
        <div style="margin-bottom:2rem">
          <div class="section-label">История покупок</div>
          <div class="section-title">МОИ ЗАКАЗЫ</div>
          <div style="font-size:0.82rem;color:var(--gray-500);margin-top:0.3rem">${orders.length} ${orders.length === 1 ? 'заказ' : orders.length < 5 ? 'заказа' : 'заказов'}</div>
        </div>
        ${orders.map(order => {
          const items = Array.isArray(order.items) ? order.items : [];
          const date = new Date(order.created_at).toLocaleDateString('ru-RU', {
            day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
          });
          const status = statusMap[order.status] || { label: order.status, cls: 'status-new' };
          const shortId = order.id?.slice(0, 8).toUpperCase();
          return `
            <div class="order-card">
              <div class="order-card-header">
                <div>
                  <div class="order-card-id">Заказ #${shortId}</div>
                  <div class="order-card-date">${date}</div>
                </div>
                <span class="order-card-status ${status.cls}">${status.label}</span>
              </div>
              <div class="order-card-items">
                ${items.slice(0, 3).map(item => `
                  <div class="order-card-item">
                    <div class="order-card-item-img">
                      ${item.image ? `<img src="${item.image}">` : '👟'}
                    </div>
                    <div style="flex:1">
                      <div class="order-card-item-name">${item.name}</div>
                      <div class="order-card-item-meta">Размер: ${item.size} · ${item.quantity} шт.</div>
                    </div>
                    <div class="order-card-item-price">${(item.price * item.quantity).toLocaleString('ru-RU')} сум</div>
                  </div>`).join('')}
                ${items.length > 3 ? `<div style="font-size:0.75rem;color:var(--gray-500);text-align:center;padding:0.5rem 0">+ ещё ${items.length - 3} товара</div>` : ''}
              </div>
              <div class="order-card-footer">
                <span class="order-card-total-label">Итого</span>
                <span class="order-card-total">${(order.total||0).toLocaleString('ru-RU')} сум</span>
              </div>
            </div>`;
        }).join('')}`;
    } catch(e) {
      console.error(e);
      container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--gray-500)">Ошибка загрузки заказов</div>';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      if (!window.Auth?.isLoggedIn()) {
        window.Auth?.openModal('login');
      } else {
        loadMyOrders();
      }
    }, 100);
  });
  </script>

  <!-- MODALS -->
  <div id="modals-placeholder"></div> 

</body>
</html>
