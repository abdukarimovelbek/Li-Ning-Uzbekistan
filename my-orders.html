  <style>
    /* PAGE HEADER */
    .page-head{
      background:linear-gradient(135deg,#141414 0%,#1e1614 60%,#0d0d0d 100%);
      color:#fff;
      padding:calc(64px + 2.4rem) clamp(16px,4vw,48px) 2.2rem;
      position:relative;
      overflow:hidden;
    }
    .page-head::before{
      content:'ORDERS';
      position:absolute;
      right:-1%; top:-15%;
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(8rem,15vw,15rem);
      letter-spacing:4px;
      color:transparent;
      -webkit-text-stroke:1px rgba(255,255,255,.04);
      pointer-events:none;
      line-height:.8
    }
    .page-head .crumb{
      font-family:'Oswald',sans-serif;
      font-size:.64rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,255,255,.35);
      display:flex;
      gap:.4rem;
      margin-bottom:.9rem
    }
    .page-head .crumb a{
      color:rgba(255,255,255,.35);
      text-decoration:none
    }
    .page-head .crumb a:hover{
      color:rgba(255,255,255,.7)
    }
    .page-head h1{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(2.4rem,6vw,4.4rem);
      letter-spacing:2px;
      line-height:.88
    }
    .page-head .sub{
      font-size:.84rem;
      color:rgba(255,255,255,.42);
      margin-top:.5rem;
      font-weight:300
    }

    /* PROFILE TABS */
    .ptabs{
      background:#141414;
      padding:0 clamp(16px,4vw,48px);
      display:flex;
      gap:.3rem;
      overflow-x:auto;
      border-bottom:1px solid rgba(255,255,255,.06)
    }
    .ptabs::-webkit-scrollbar{display:none}
    .ptab{
      font-family:'Oswald',sans-serif;
      font-size:.74rem;
      font-weight:600;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,.4);
      padding:1rem 1.1rem;
      white-space:nowrap;
      position:relative;
      transition:.2s;
      display:flex;
      align-items:center;
      gap:.5rem;
      text-decoration:none;
      cursor:pointer
    }
    .ptab svg{width:15px; height:15px}
    .ptab:hover{color:rgba(255,255,255,.8)}
    .ptab.on{color:#fff}
    .ptab.on::after{
      content:'';
      position:absolute;
      left:1.1rem;
      right:1.1rem;
      bottom:0;
      height:2px;
      background:var(--red)
    }
    .ptab .cnt{
      background:var(--red);
      color:#fff;
      font-size:.6rem;
      font-weight:700;
      padding:.05rem .4rem;
      border-radius:8px
    }

    /* CONTENT */
    .mo-wrap{
      max-width:920px;
      margin:0 auto;
      padding:2.4rem clamp(16px,4vw,40px) 6rem
    }
    .mo-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.6rem;
      gap: 1rem;
      flex-wrap: wrap;
      position: sticky;
      top: 64px;
      z-index: 50;
      padding: 0.75rem clamp(16px, 4vw, 40px);
      margin-left: calc(-1 * clamp(16px, 4vw, 40px));
      margin-right: calc(-1 * clamp(16px, 4vw, 40px));
      background: transparent;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .mo-lab{font-family:'Oswald',sans-serif;font-size:.84rem;letter-spacing:.04em;color:#888}
    .mo-lab b{color:#1A1A1A}
    .mo-filters{display:flex;gap:.5rem;overflow-x:auto}
    .mo-filters::-webkit-scrollbar{display:none}
    .mo-fchip{font-family:'Oswald',sans-serif;font-size:.68rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.5rem .9rem;border:1.5px solid #EDE9E3;border-radius:100px;color:#555;background:#fff;white-space:nowrap;transition:.2s;cursor:pointer}
    .mo-fchip:hover{border-color:#C0B8B0}
    .mo-fchip.on{background:#1A1A1A;color:#fff;border-color:#1A1A1A}
    /* Frosted glass when toolbar is stuck */
    .mo-toolbar.stuck {
      background: rgba(250, 248, 245, 0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    /* Desktop: chips spread to full width when stuck */
    @media (min-width: 769px) {
      .mo-lab {
        transition: opacity 0.25s ease, max-width 0.3s cubic-bezier(.22, 1, .36, 1);
        overflow: hidden;
        white-space: nowrap;
      }
      .mo-toolbar.stuck .mo-lab {
        opacity: 0;
        max-width: 0;
        margin: 0;
        padding: 0;
      }
      .mo-toolbar.stuck .mo-filters {
        flex: 1;
        gap: 0.6rem;
      }
      .mo-toolbar.stuck .mo-fchip {
        flex: 1;
        text-align: center;
        justify-content: center;
      }
    }

    /* Navbar page title (injected via JS) */
    #mo-nav-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #fff;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, calc(-50% + 5px));
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    #mo-nav-title.visible {
      opacity: 1;
      transform: translate(-50%, -50%);
    }

    /* ORDER CARD */
    .ocard{
      background:#fff;border:1px solid #EDE9E3;border-radius:20px;
      margin-bottom:1.3rem;overflow:hidden;
      transition:box-shadow .4s cubic-bezier(.22,1,.36,1),border-color .3s;
      opacity:0;transform:translateY(24px);animation:moRise .7s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes moRise{to{opacity:1;transform:none}}
    .ocard:hover{box-shadow:0 14px 44px rgba(0,0,0,.09)}

    .ocard-head{
      display:flex;
      align-items:center;
      gap:1rem;
      padding:1.3rem 1.5rem;
      border-bottom:1px solid #EDE9E3;
      flex-wrap:wrap
    }
    .ocard-id{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.5px;color:#1A1A1A}
    .ocard-date{font-size:.74rem;color:#888;margin-top:.15rem}
    .ocard-status{
      margin-left:auto;
      font-family:'Oswald',sans-serif;
      font-size:.66rem;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      padding:.4rem .85rem;
      border-radius:100px;
      display:flex;
      align-items:center;
      gap:.4rem
    }
    .ocard-status .dot{width:7px;height:7px;border-radius:50%}
    .ost-new{background:rgba(184,134,11,.14);color:#B8860B}.ost-new .dot{background:#B8860B}
    .ost-processing{background:rgba(59,130,246,.12);color:#3b82f6}.ost-processing .dot{background:#3b82f6;animation:moBlink 1.4s infinite}
    .ost-delivered{background:rgba(30,158,90,.12);color:#1e9e5a}.ost-delivered .dot{background:#1e9e5a}
    .ost-cancelled{background:rgba(196,30,58,.1);color:var(--red)}.ost-cancelled .dot{background:var(--red)}
    @keyframes moBlink{0%,100%{opacity:1}50%{opacity:.3}}

    /* TRACKER */
    .otrack{
      padding:1.6rem 1.5rem;
      background:linear-gradient(180deg,#FAF8F5,transparent)
    }
    .otrack.cancelled{background:rgba(196,30,58,.03)}
    .otrack-wrap{position:relative}
    .otline{position:absolute;top:18px;left:6%;right:6%;height:3px;background:#EDE9E3;border-radius:2px;overflow:hidden;z-index:0}
    .otline i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#1e9e5a,#27c96e);transform:scaleX(0);transform-origin:left;transition:transform 1.3s cubic-bezier(.22,1,.36,1)}
    .otrack-row{display:flex;justify-content:space-between;position:relative;z-index:1}
    .onode{display:flex;flex-direction:column;align-items:center;text-align:center;flex:1}
    .onode .ball{width:38px;height:38px;border-radius:50%;background:#fff;border:2px solid #EDE9E3;color:#C0B8B0;display:flex;align-items:center;justify-content:center;transition:.4s cubic-bezier(.22,1,.36,1)}
    .onode .ball svg{width:16px;height:16px}
    .onode.done .ball{background:#1e9e5a;border-color:#1e9e5a;color:#fff}
    .onode.current .ball{background:#1e9e5a;border-color:#1e9e5a;color:#fff;box-shadow:0 0 0 5px rgba(30,158,90,.18);animation:moPulse 2s ease-in-out infinite}
    @keyframes moPulse{0%,100%{box-shadow:0 0 0 5px rgba(30,158,90,.18)}50%{box-shadow:0 0 0 9px rgba(30,158,90,.06)}}
    .onode .nl{font-family:'Oswald',sans-serif;font-size:.64rem;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:#888;margin-top:.55rem;line-height:1.25}
    .onode.done .nl,.onode.current .nl{color:#1A1A1A}
    .onode .nt{font-size:.62rem;color:#A7A099;margin-top:.15rem}
    .otrack-cancel{display:flex;align-items:center;gap:.7rem;color:var(--red);font-weight:600;font-size:.86rem;padding:.4rem 0}
    .otrack-cancel svg{width:20px;height:20px;flex:none}

    /* ETA */
    .oeta{display:flex;align-items:center;gap:.7rem;margin-top:1.3rem;padding:.85rem 1.1rem;background:#fff;border:1px solid #EDE9E3;border-radius:14px;font-size:.82rem;color:#555}
    .oeta .ic{font-size:1.2rem}
    .oeta b{color:#1A1A1A}
    .oeta .when{margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.5px;color:var(--red);white-space:nowrap}

    /* ITEMS TOGGLE */
    .oitems-toggle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:1rem;
      padding:1rem 1.5rem;
      cursor:pointer;
      border-top:1px solid #EDE9E3;
      transition:background .2s
    }
    .oitems-toggle:hover{background:#FAF8F5}
    .oitems-toggle .lbl{font-family:'Oswald',sans-serif;font-size:.76rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#555;display:flex;align-items:center;gap:.55rem}
    .oitems-toggle:hover .lbl{color:#1A1A1A}
    .oitems-toggle .lbl svg{width:16px;height:16px;color:#888}
    .oitems-toggle .chev2{width:28px;height:28px;border-radius:50%;background:#F2EEE8;display:flex;align-items:center;justify-content:center;color:#888;transition:transform .35s cubic-bezier(.22,1,.36,1),background .2s}
    .oitems-toggle.open .chev2{transform:rotate(180deg);background:var(--red);color:#fff}
    .oitems-collapse{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.22,1,.36,1)}

    /* ITEMS */
    .oitems{padding:.5rem 1.5rem 1rem;display:flex;flex-direction:column}
    .oitem{display:flex;align-items:center;gap:1rem;padding:.9rem 0;border-bottom:1px solid #EDE9E3}
    .oitem:last-child{border-bottom:none}
    .oitem-img{width:56px;height:56px;border-radius:10px;background:#FAF8F5;flex:none;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .oitem-img img{width:100%;height:100%;object-fit:contain;padding:8%}
    .oitem-img .ph{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#A7A099}
    .oitem-b{flex:1;min-width:0}
    .oitem-nm{font-weight:600;font-size:.86rem;color:#1A1A1A;line-height:1.3}
    .oitem-m{font-size:.72rem;color:#888;margin-top:.15rem}
    .oitem-p{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.5px;color:#1A1A1A;flex:none;white-space:nowrap}

    /* CARD FOOTER */
    .ocard-foot{display:flex;align-items:center;gap:1rem;padding:1.1rem 1.5rem;border-top:1px solid #EDE9E3;background:#FAF8F5;flex-wrap:wrap}
    .ocard-tot{
      font-family:'Oswald',sans-serif;
      font-size:.74rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#888
    }
    .ocard-tot b{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.5px;color:var(--red);margin-left:.5rem}
    .ocard-acts{margin-left:auto;display:flex;gap:.6rem;flex-wrap:wrap}
    .oact{font-family:'Oswald',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.65rem 1.1rem;border-radius:9px;transition:.25s cubic-bezier(.22,1,.36,1);display:inline-flex;align-items:center;gap:.45rem;cursor:pointer;border:none}
    .oact svg{width:14px;height:14px}
    .oact-pri{background:var(--red);color:#fff}
    .oact-pri:hover{background:#A01830;transform:translateY(-2px);box-shadow:0 8px 22px rgba(196,30,58,.3)}
    .oact-gh{background:#fff;color:#555;box-shadow:inset 0 0 0 1.5px #EDE9E3}
    .oact-gh:hover{box-shadow:inset 0 0 0 1.5px #1A1A1A;color:#1A1A1A}

    /* EMPTY */
    .mo-empty{text-align:center;padding:5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
    .mo-empty .ic{width:88px;height:88px;border-radius:50%;background:#F2EEE8;display:flex;align-items:center;justify-content:center;font-size:2.4rem}
    .mo-empty h3{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1.5px;color:#1A1A1A}
    .mo-empty p{color:#888;font-size:.9rem}

    @media(max-width:768px){
      .page-head{
        padding:calc(32px + 0rem) clamp(16px,4vw,48px) 1.1rem;
      }
      .ocard-foot{
        flex-direction:column;
        align-items:stretch;
        padding: 1rem 1rem;
      }
      .ocard-acts{margin-left:0}
      .oact{flex:1;justify-content:center}
      .onode .nt{display:none}
      .oeta{flex-wrap:wrap}
      .oeta .when{margin-left:0;margin-top:.3rem}
      .mo-wrap{
        padding:0.4rem clamp(1px,4vw,40px) 6rem
      }
      .mo-toolbar {
        gap: 0.5rem;
      }
      .ocard-head{
        gap: 0;
        padding:1rem 1rem;
      }
      .otrack{
        padding:1rem 1rem;
      }
      .oitems-toggle{
        padding:1rem 1rem;
      } 
      .oitems{
        padding:.5rem 1rem 0.5rem;
      }
      .ocard-status{
        padding:.4rem .7rem;
      }
      .ocard-tot{
        display: flex;
      }
    }
    @media(prefers-reduced-motion:reduce){
      .ocard{
        opacity:1!important;
        transform:none!important;
        animation:none!important}
      }      
  </style>
</head>

    <div class="ln-load-stage">
      <img class="ln-load-logo" src="logo.jpg" alt="Li-Ning">
      <div class="ln-load-sub">Official Distributor · Uzbekistan</div>

      <div class="ln-load-status">Подготовка коллекции</div>

  <style>
  #ln-loader{position:fixed;inset:0;z-index:99999;background:#141414;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
  #ln-loader.ln-done{pointer-events:none}
  .ln-load-stage{position:relative;text-align:center;z-index:2}
  .ln-load-logo{height:clamp(46px,7vw,78px);width:auto;filter:invert(1) brightness(1.6);display:block;margin:0 auto;clip-path:inset(0 100% 0 0);opacity:0}
  .ln-load-sub{margin-top:1.4rem;font-size:.7rem;letter-spacing:.5em;text-transform:uppercase;color:rgba(255,255,255,.5);padding-left:.5em;opacity:0;transform:translateY(8px)}
  .ln-load-bar{position:absolute;left:7vw;right:7vw;bottom:7%;height:2px;background:rgba(255,255,255,.12);z-index:2}
  .ln-load-bar i{display:block;height:100%;width:0;background:#C41E3A;box-shadow:0 0 12px #C41E3A;transition:width .1s linear}
  .ln-load-meta{position:absolute;left:0;right:0;bottom:9%;display:flex;align-items:flex-end;justify-content:space-between;padding:0 7vw;z-index:2}
  .ln-load-num{font-family:'Bebas Neue','Oswald',sans-serif;font-size:clamp(3rem,9vw,7rem);line-height:.8;color:#fff;letter-spacing:2px}
  .ln-load-num small{font-size:.32em;vertical-align:super;color:#C41E3A}
  .ln-load-status{font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;text-align:right;max-width:45%}
  .ln-load-curtain{position:absolute;inset:0;z-index:5;display:flex;pointer-events:none}
  .ln-load-curtain span{flex:1;background:#141414;transform:translateY(0)}
  @media(prefers-reduced-motion:reduce){#ln-loader{display:none!important}}
  </style>
  <script>
  (function(){
    var L=document.getElementById('ln-loader'); if(!L) return;
    if(sessionStorage.getItem('ln_intro_seen')){ L.parentNode.removeChild(L); return; }
    var logo=L.querySelector('.ln-load-logo'), sub=L.querySelector('.ln-load-sub'),
        bar=L.querySelector('.ln-load-bar i'), num=L.querySelector('.ln-load-num'),
        status=L.querySelector('.ln-load-status'), curtain=L.querySelector('.ln-load-curtain');
    var statuses=['Подготовка коллекции','Загрузка витрины','Полировка пикселей','Почти готово'];
    document.documentElement.style.overflow='hidden';
    setTimeout(function(){ logo.style.transition='clip-path 1.1s cubic-bezier(.76,0,.24,1),opacity .5s'; logo.style.clipPath='inset(0 0 0 0)'; logo.style.opacity='1'; },150);
    setTimeout(function(){ sub.style.transition='opacity .8s,transform .8s cubic-bezier(.22,1,.36,1)'; sub.style.opacity='1'; sub.style.transform='none'; },700);
    var t0=performance.now(), DUR=2000, done=false;
    function reveal(){
      if(done) return; done=true;
      sessionStorage.setItem('ln_intro_seen','1');
      document.documentElement.style.overflow='';
      [].forEach.call(curtain.children,function(s,i){ s.style.transition='transform .75s cubic-bezier(.76,0,.24,1) '+(i*0.07)+'s'; s.style.transform='translateY(-101%)'; });
      setTimeout(function(){ L.classList.add('ln-done'); L.style.transition='opacity .3s'; L.style.opacity='0'; },300);
      setTimeout(function(){ if(L.parentNode) L.parentNode.removeChild(L); },1150);
    }
    function tick(now){
      var p=Math.min((now-t0)/DUR,1), e=1-Math.pow(1-p,3), v=Math.round(e*100);
      num.firstChild.nodeValue=v; bar.style.width=v+'%';
      status.textContent=statuses[Math.min(3,Math.floor(p*4))];
      if(p<1) requestAnimationFrame(tick); else setTimeout(reveal,260);
    }
    requestAnimationFrame(tick);
    setTimeout(reveal, DUR+1500); // подстраховка, чтобы интро не зависло
  })();
  </script>

      </div>
    </div>
    <div id="orders-container"></div>
  </div>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      if (SITE_CONFIG.orders_enabled === false) showFeatureDisabledModal('orders');
    }, 1500);
  });

  const fp = n => n.toLocaleString('ru-RU') + ' сум';
  const STATUS_LABEL = { new:'Новый', processing:'В работе', delivered:'Доставлен', cancelled:'Отменён' };
  const STATUS_STAGE = { new:0, processing:1, delivered:3 };
  const STAGES = ['Оформлен','Собран','В пути','Доставлен'];
  const STAGE_ICONS = [
    '<path d="M20 6 9 17l-5-5"/>',
    '<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18M16 10a4 4 0 0 1-8 0"/>',
    '<path d="M5 18H3V6h13v12h-2M16 8h4l3 4v6h-3"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/>',
    '<path d="M3 11l9-8 9 8M5 10v10h14V10"/>'
  ];

  let moAllOrders = [];
  let moFilter = 'all';

  function trackerHTML(o) {
    if (o.status === 'cancelled') {
      return `<div class="otrack cancelled"><div class="otrack-cancel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>
        Заказ отменён. Если это ошибка — свяжитесь с поддержкой.</div></div>`;
    }
    const cur = STATUS_STAGE[o.status] ?? 0;
    const isDelivered = o.status === 'delivered';
    const pct = isDelivered ? 100 : cur === 0 ? 6 : cur === 1 ? 33 : cur === 2 ? 66 : 100;
    const nodes = STAGES.map((s, i) => {
      const cls = isDelivered ? 'done' : i < cur ? 'done' : i === cur ? 'current' : '';
      const nt = (!isDelivered && i === cur) ? 'сейчас' : '';
      return `<div class="onode ${cls}"><div class="ball"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">${STAGE_ICONS[i]}</svg></div><div class="nl">${s}</div><div class="nt">${nt}</div></div>`;
    }).join('');
    const eta = o.status === 'delivered'
      ? `<div class="oeta"><span class="ic">✅</span><div><b>Доставлен</b> · спасибо за покупку!</div></div>`
      : `<div class="oeta"><span class="ic">🚚</span><div>Менеджер уточнит дату доставки по <b>Ташкенту</b></div><span class="when">—</span></div>`;
    return `<div class="otrack"><div class="otrack-wrap">
      <div class="otline"><i data-w="${pct}"></i></div>
      <div class="otrack-row">${nodes}</div>
    </div>${eta}</div>`;
  }

  function cardHTML(o, idx) {
    const st = STATUS_LABEL[o.status] || o.status;
    const shortId = o.id?.slice(0, 8).toUpperCase();
    const date = new Date(o.created_at).toLocaleDateString('ru-RU', {
      day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    const items = Array.isArray(o.items) ? o.items : [];
    const itemsHtml = items.map(it => `
      <div class="oitem">
        <div class="oitem-img">${it.image ? `<img src="${it.image}" alt="">` : '<span class="ph">LN</span>'}</div>
        <div class="oitem-b"><div class="oitem-nm">${it.name}</div><div class="oitem-m">Размер: ${it.size} · ${it.quantity} шт.</div></div>
        <div class="oitem-p">${fp(it.price * it.quantity)}</div>
      </div>`).join('');

    const acts = o.status === 'delivered'
      ? `<button class="oact oact-gh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9M3 12V7M3 12h5"/></svg>Повторить заказ</button>
         <button class="oact oact-pri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>Оставить отзыв</button>`
      : o.status === 'cancelled'
      ? `<button class="oact oact-gh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9M3 12V7M3 12h5"/></svg>Повторить заказ</button>`
      : `<button class="oact oact-gh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Поддержка</button>
         <button class="oact oact-pri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 18H3V6h13v12h-2M16 8h4l3 4v6h-3"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>Отследить</button>`;

    return `<div class="ocard" style="animation-delay:${idx * .08}s" data-st="${o.status}">
      <div class="ocard-head">
        <div><div class="ocard-id">Заказ #${shortId}</div><div class="ocard-date">${date}</div></div>
        <span class="ocard-status ost-${o.status}"><span class="dot"></span>${st}</span>
      </div>
      ${trackerHTML(o)}
      <div class="oitems-toggle" onclick="this.classList.toggle('open');const c=this.nextElementSibling;c.style.maxHeight=this.classList.contains('open')?c.scrollHeight+'px':'0'">
        <span class="lbl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18M16 10a4 4 0 0 1-8 0"/></svg>Товары в заказе (${items.length})</span>
        <span class="chev2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></span>
      </div>
      <div class="oitems-collapse"><div class="oitems">${itemsHtml}</div></div>
      <div class="ocard-foot">
        <div class="ocard-tot">
          <div>Итого</div>
          <span class="ocard-tot"><b>${fp(o.total || 0)}</b></span>
        </div>  
        <div class="ocard-acts">${acts}</div>
      </div>
    </div>`;
  }

  function renderOrders() {
    const list = moFilter === 'all' ? moAllOrders : moAllOrders.filter(o => o.status === moFilter);
    const el = document.getElementById('orders-container');
    const cntEl = document.getElementById('mo-cnt');
    if (!list.length) {
      el.innerHTML = `<div class="mo-empty"><div class="ic">📦</div><h3>ЗАКАЗОВ НЕТ</h3><p>В этой категории пока пусто</p></div>`;
      if (cntEl) cntEl.textContent = '0';
      return;
    }
    el.innerHTML = list.map((o, i) => cardHTML(o, i)).join('');
    if (cntEl) cntEl.textContent = list.length;
    requestAnimationFrame(() => setTimeout(() => {
      document.querySelectorAll('.otline i').forEach(i => i.style.transform = 'scaleX(' + (i.dataset.w / 100) + ')');
    }, 300));
  }

  async function loadMyOrders() {
    const container = document.getElementById('orders-container');
    const user = window.Auth?.getUser();
    if (!user) return;

    container.innerHTML = '<div style="text-align:center;padding:3rem;color:#888;font-size:.9rem">Загрузка заказов...</div>';

    try {
      const res = await fetch(
        `${SB_URL}/rest/v1/orders?email=eq.${encodeURIComponent(user.email)}&order=created_at.desc`,
        { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      moAllOrders = await res.json();

      const tabCnt = document.getElementById('mo-tab-cnt');
      if (tabCnt) tabCnt.textContent = moAllOrders.length;

      document.getElementById('mo-filters')?.addEventListener('click', e => {
        const b = e.target.closest('.mo-fchip');
        if (!b) return;
        moFilter = b.dataset.f;
        document.querySelectorAll('.mo-fchip').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        renderOrders();
      });

      renderOrders();
    } catch(e) {
      console.error(e);
      container.innerHTML = '<div style="text-align:center;padding:3rem;color:#888">Ошибка загрузки заказов</div>';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const tryLoad = () => {
      if (!document.getElementById('auth-btn')) { setTimeout(tryLoad, 100); return; }
      if (!window.Auth?.isLoggedIn()) {
        window.Auth?.openModal('login');
      } else {
        loadMyOrders();
      }
    };
    tryLoad();
    document.addEventListener('auth:login', loadMyOrders);
  });

  document.addEventListener('DOMContentLoaded', () => {
    initStickyToolbar();
    initNavbarTitle();
  });

  function initStickyToolbar() {
    const sentinel = document.getElementById('mo-sentinel');
    const toolbar = document.querySelector('.mo-toolbar');
    if (!sentinel || !toolbar) return;

    const obs = new IntersectionObserver(([entry]) => {
      toolbar.classList.toggle('stuck', !entry.isIntersecting);
    }, { rootMargin: '-64px 0px 0px 0px', threshold: 0 });

    obs.observe(sentinel);
  }

  function initNavbarTitle() {
    const ptabs = document.querySelector('.ptabs');
    if (!ptabs) return;

    const wait = () => {
      const navbar = document.querySelector('nav.navbar');
      if (!navbar) { setTimeout(wait, 100); return; }

      const title = document.createElement('div');
      title.id = 'mo-nav-title';
      title.textContent = 'МОИ ЗАКАЗЫ';
      navbar.appendChild(title);

      const obs = new IntersectionObserver(([entry]) => {
        title.classList.toggle('visible', !entry.isIntersecting);
      }, { rootMargin: '-64px 0px 0px 0px', threshold: 0 });

      obs.observe(ptabs);
    };

    wait();
  }
  </script>

  <!-- MODALS -->
  <div id="modals-placeholder"></div> 
      
</body>
</html>
