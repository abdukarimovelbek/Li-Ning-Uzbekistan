<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Скидки до 70% — Li Ning Store</title>
  <meta name="description" content="Скидки на оригинальную продукцию Li Ning в Узбекистане. Кроссовки, одежда и аксессуары по специальным ценам. Ограниченное количество товаров.">
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8K29V08VJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8K29V08VJM');
  </script>  
  <style>
    .sale-hero {
      position: relative;
      width: 100%;
      height: calc(100vh - var(--nav-h));
      overflow: hidden;
      flex-shrink: 0;
      z-index: 1;
    }
    @media (max-width: 768px) {
      .sale-hero {
        height: 100svh;
        margin-top: calc(-1 * var(--nav-h));
      }
    }
    .sale-hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center top;
      background: #FF1800;
      display: none;
      opacity: 0;
      transition: opacity 1.2s ease;
      z-index: 1;
    }
    .sale-hero-video.visible { opacity: 1; }
    .sale-hero-fallback {
      position: absolute;
      inset: 0;
      background: #FF1800;
      z-index: 0;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>

  <!-- Sale Hero -->
  <div class="sale-hero" id="sale-hero">
    <div class="sale-hero-fallback" id="sale-hero-fallback"></div>
    <video id="sale-hero-video-desktop" class="sale-hero-video" autoplay muted loop playsinline></video>
    <video id="sale-hero-video-mobile"  class="sale-hero-video" autoplay muted loop playsinline></video>
  </div>

  <section class="section">
    <div class="section-inner">
      <div class="section-head">
        <div>
          <div class="section-label">Специальные цены</div>
          <div class="section-title">ТОВАРЫ<br>СО СКИДКОЙ</div>
        </div>
        <a href="catalog.html" class="see-all">Весь каталог →</a>
      </div>
      <div class="products-grid" id="sale-grid">
        <div style="text-align:center;padding:3rem;color:var(--gray-500);grid-column:1/-1">Загрузка...</div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script>
  // Загружаем hero видео из Supabase
  (async () => {
    try {
      const res = await fetch(
        `${SB_URL}/rest/v1/site_settings?id=eq.main&select=sale_hero_video,sale_hero_video_mobile`,
        { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }
      );
      const data = await res.json();
      const row = data?.[0];
      const isMobile = window.innerWidth <= 768;

      const desktopUrl = row?.sale_hero_video;
      const mobileUrl  = row?.sale_hero_video_mobile;

      // Выбираем нужное видео: на мобайле — мобайл (если есть), иначе десктоп
      const activeUrl = isMobile && mobileUrl ? mobileUrl : desktopUrl;

      if (activeUrl) {
        const videoEl = isMobile && mobileUrl
          ? document.getElementById('sale-hero-video-mobile')
          : document.getElementById('sale-hero-video-desktop');

        videoEl.src = activeUrl;
        videoEl.style.display = 'block';
        videoEl.addEventListener('canplay', () => {
          videoEl.classList.add('visible');
          document.getElementById('sale-hero-fallback').style.display = 'none';
        }, { once: true });
        videoEl.load();
      }
    } catch(e) {}
  })();

  // Load sale products from Supabase
  document.addEventListener('DOMContentLoaded', async function() {
    const grid = document.getElementById('sale-grid');

    // Ждём акции
    await new Promise(resolve => {
      if (window.PROMO_DATES_LOADED) { resolve(); return; }
      window.addEventListener('promo-dates-loaded', resolve, { once: true });
      setTimeout(resolve, 3000);
    });

    // Ждём топ-товары
    await new Promise(resolve => {
      if (window.FEATURED_ARTICLES_LOADED) { resolve(); return; }
      window.addEventListener('featured-articles-loaded', resolve, { once: true });
      setTimeout(resolve, 2000);
    });

    grid.innerHTML = buildSkeletons(8);

    try {
      // Если активна 1=3 — все товары участвуют в акции, показываем весь каталог
      // Иначе — только товары с явной скидкой (old_price > 0)
      const query = isPromoActive('1=3')
        ? SB_URL + '/rest/v1/products?is_active=eq.true&limit=48'
        : SB_URL + '/rest/v1/products?is_active=eq.true&old_price=gt.0&order=old_price.desc&limit=24';

      const res = await fetch(query, { headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' } });
      const products = await res.json();

      if (!Array.isArray(products) || !products.length) {
        grid.innerHTML = '<p style="text-align:center;color:var(--gray-500);padding:3rem;grid-column:1/-1">Нет товаров со скидкой</p>';
        return;
      }

      grid.innerHTML = sortWithFeatured(products).map(p => buildCard(p)).join('');
      window.ProductCards?.init();
      highlightWishlist();
    } catch(e) {
      console.error('sale fetch error', e);
      grid.innerHTML = '<p style="text-align:center;color:var(--gray-500);padding:3rem;grid-column:1/-1">Ошибка загрузки</p>';
    }
  });
  </script>

  <!-- CITY MODAL -->
  <div id="modals-placeholder"></div>

</body>
</html>
