<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8K29V08VJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8K29V08VJM');
  </script>  
  <style>
    .sale-hero {
      position: relative;
      width: 100%;
      height: calc(100vh - var(--nav-h));
      overflow: hidden;
      flex-shrink: 0;
      z-index: 1;
    }
    @media (max-width: 768px) {
      .sale-hero {
        height: 100svh;
        margin-top: calc(-1 * var(--nav-h));
      }
    }
    .sale-hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center top;
      background: #FF1800;
      display: none;
      opacity: 0;
      transition: opacity 1.2s ease;
      z-index: 1;
    }
    .sale-hero-video.visible { opacity: 1; }
    .sale-hero-fallback {
      position: absolute;
      inset: 0;
      background: #FF1800;
      z-index: 0;
    }
  </style>
</head>

<body>
  <!-- ════════ LI-NING CINEMATIC LOADER — Ink ════════ -->
  <div id="ln-loader" aria-hidden="true">
    <div class="ln-load-stage">
      <img class="ln-load-logo" src="logo.jpg" alt="Li-Ning">
      <div class="ln-load-sub">Official Distributor · Uzbekistan</div>
    </div>
    <div class="ln-load-bar"><i></i></div>
    <div class="ln-load-meta">
      <div class="ln-load-num">0<small>%</small></div>
      <div class="ln-load-status">Подготовка коллекции</div>
    </div>
    <div class="ln-load-curtain"><span></span><span></span><span></span><span></span><span></span></div>
  </div>
  <style>
  #ln-loader{position:fixed;inset:0;z-index:99999;background:#141414;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
  #ln-loader.ln-done{pointer-events:none}
  .ln-load-stage{position:relative;text-align:center;z-index:2}
  .ln-load-logo{height:clamp(46px,7vw,78px);width:auto;filter:invert(1) brightness(1.6);display:block;margin:0 auto;clip-path:inset(0 100% 0 0);opacity:0}
  .ln-load-sub{margin-top:1.4rem;font-size:.7rem;letter-spacing:.5em;text-transform:uppercase;color:rgba(255,255,255,.5);padding-left:.5em;opacity:0;transform:translateY(8px)}
  .ln-load-bar{position:absolute;left:7vw;right:7vw;bottom:7%;height:2px;background:rgba(255,255,255,.12);z-index:2}
  .ln-load-bar i{display:block;height:100%;width:0;background:#FF1800;box-shadow:0 0 12px #FF1800;transition:width .1s linear}
  .ln-load-meta{position:absolute;left:0;right:0;bottom:9%;display:flex;align-items:flex-end;justify-content:space-between;padding:0 7vw;z-index:2}
  .ln-load-num{font-family:'Bebas Neue','Oswald',sans-serif;font-size:clamp(3rem,9vw,7rem);line-height:.8;color:#fff;letter-spacing:2px}
  .ln-load-num small{font-size:.32em;vertical-align:super;color:#FF1800}
  .ln-load-status{font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;text-align:right;max-width:45%}
  .ln-load-curtain{position:absolute;inset:0;z-index:5;display:flex;pointer-events:none}
  .ln-load-curtain span{flex:1;background:#141414;transform:translateY(0)}
  @media(prefers-reduced-motion:reduce){#ln-loader{display:none!important}}
  </style>
  <script>
  (function(){
    var L=document.getElementById('ln-loader'); if(!L) return;
    if(sessionStorage.getItem('ln_intro_seen')){ L.parentNode.removeChild(L); return; }
    var logo=L.querySelector('.ln-load-logo'), sub=L.querySelector('.ln-load-sub'),
        bar=L.querySelector('.ln-load-bar i'), num=L.querySelector('.ln-load-num'),
        status=L.querySelector('.ln-load-status'), curtain=L.querySelector('.ln-load-curtain');
    var statuses=['Подготовка коллекции','Загрузка витрины','Полировка пикселей','Почти готово'];
    document.documentElement.style.overflow='hidden';
    setTimeout(function(){ logo.style.transition='clip-path 1.1s cubic-bezier(.76,0,.24,1),opacity .5s'; logo.style.clipPath='inset(0 0 0 0)'; logo.style.opacity='1'; },150);
    setTimeout(function(){ sub.style.transition='opacity .8s,transform .8s cubic-bezier(.22,1,.36,1)'; sub.style.opacity='1'; sub.style.transform='none'; },700);
    var t0=performance.now(), DUR=2000, done=false;
    function reveal(){
      if(done) return; done=true;
      sessionStorage.setItem('ln_intro_seen','1');
      document.documentElement.style.overflow='';
      [].forEach.call(curtain.children,function(s,i){ s.style.transition='transform .75s cubic-bezier(.76,0,.24,1) '+(i*0.07)+'s'; s.style.transform='translateY(-101%)'; });
      setTimeout(function(){ L.classList.add('ln-done'); L.style.transition='opacity .3s'; L.style.opacity='0'; },300);
      setTimeout(function(){ if(L.parentNode) L.parentNode.removeChild(L); },1150);
    }
    function tick(now){
      var p=Math.min((now-t0)/DUR,1), e=1-Math.pow(1-p,3), v=Math.round(e*100);
      num.firstChild.nodeValue=v; bar.style.width=v+'%';
      status.textContent=statuses[Math.min(3,Math.floor(p*4))];
      if(p<1) requestAnimationFrame(tick); else setTimeout(reveal,260);
    }
    requestAnimationFrame(tick);
    setTimeout(reveal, DUR+1500); // подстраховка, чтобы интро не зависло
  })();
  </script>

  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>

  <!-- Sale Hero -->
  <div class="sale-hero" id="sale-hero">
    <div class="sale-hero-fallback" id="sale-hero-fallback"></div>
    <video id="sale-hero-video-desktop" class="sale-hero-video" autoplay muted loop playsinline></video>
    <video id="sale-hero-video-mobile"  class="sale-hero-video" autoplay muted loop playsinline></video>
  </div>

  <section class="section">
    <div class="section-inner">
      <div class="section-head">
        <div>
          <div class="section-label">Специальные цены</div>
          <div class="section-title">ТОВАРЫ<br>СО СКИДКОЙ</div>
        </div>
        <a href="catalog.html" class="see-all">Весь каталог →</a>
      </div>
      <div class="products-grid" id="sale-grid">
        <div style="text-align:center;padding:3rem;color:var(--gray-500);grid-column:1/-1">Загрузка...</div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script>
  // Загружаем hero видео из Supabase
  (async () => {
    try {
      const res = await fetch(
        `${SB_URL}/rest/v1/site_settings?id=eq.main&select=sale_hero_video,sale_hero_video_mobile`,
        { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }
      );
      const data = await res.json();
      const row = data?.[0];
      const isMobile = window.innerWidth <= 768;

      const desktopUrl = row?.sale_hero_video;
      const mobileUrl  = row?.sale_hero_video_mobile;

      // Выбираем нужное видео: на мобайле — мобайл (если есть), иначе десктоп
      const activeUrl = isMobile && mobileUrl ? mobileUrl : desktopUrl;

      if (activeUrl) {
        const videoEl = isMobile && mobileUrl
          ? document.getElementById('sale-hero-video-mobile')
          : document.getElementById('sale-hero-video-desktop');

        videoEl.src = activeUrl;
        videoEl.style.display = 'block';
        videoEl.addEventListener('canplay', () => {
          videoEl.classList.add('visible');
          document.getElementById('sale-hero-fallback').style.display = 'none';
        }, { once: true });
        videoEl.load();
      }
    } catch(e) {}
  })();

  // Load sale products from Supabase
  document.addEventListener('DOMContentLoaded', async function() {
    const grid = document.getElementById('sale-grid');

    // Ждём акции
    await new Promise(resolve => {
      if (window.PROMO_DATES_LOADED) { resolve(); return; }
      window.addEventListener('promo-dates-loaded', resolve, { once: true });
      setTimeout(resolve, 3000);
    });

    // Ждём топ-товары
    await new Promise(resolve => {
      if (window.FEATURED_ARTICLES_LOADED) { resolve(); return; }
      window.addEventListener('featured-articles-loaded', resolve, { once: true });
      setTimeout(resolve, 2000);
    });

    try {
      // Если активна 1=3 — все товары участвуют в акции, показываем весь каталог
      // Иначе — только товары с явной скидкой (old_price > 0)
      const query = isPromoActive('1=3')
        ? SB_URL + '/rest/v1/products?is_active=eq.true&limit=48'
        : SB_URL + '/rest/v1/products?is_active=eq.true&old_price=gt.0&order=old_price.desc&limit=24';

      const res = await fetch(query, { headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' } });
      const products = await res.json();

      if (!Array.isArray(products) || !products.length) {
        grid.innerHTML = '<p style="text-align:center;color:var(--gray-500);padding:3rem;grid-column:1/-1">Нет товаров со скидкой</p>';
        return;
      }

      grid.innerHTML = sortWithFeatured(products).map(p => buildCard(p)).join('');
      window.ProductCards?.init();
      highlightWishlist();
    } catch(e) {
      console.error('sale fetch error', e);
      grid.innerHTML = '<p style="text-align:center;color:var(--gray-500);padding:3rem;grid-column:1/-1">Ошибка загрузки</p>';
    }
  });
  </script>

  <!-- CITY MODAL -->
  <div id="modals-placeholder"></div>

</body>
</html>
