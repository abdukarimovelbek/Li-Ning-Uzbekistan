<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Li-Ning Admin — Вход</title>
  <link rel="icon" type="image/jpeg" href="../logo.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#f0f0ef;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-wrap{width:100%;max-width:420px;padding:1.5rem}
    .login-card{background:#fff;padding:2.5rem;border:1px solid #e5e5e5}
    .login-logo{text-align:center;margin-bottom:2rem}
    .login-logo img{height:36px}
    .login-logo p{font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:#999;margin-top:.6rem}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:.3rem}
    .subtitle{font-size:.85rem;color:#888;margin-bottom:2rem}
    .form-group{margin-bottom:1.2rem}
    label{display:block;font-size:.75rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#555;margin-bottom:.4rem}
    input{width:100%;padding:.8rem 1rem;border:1.5px solid #e5e5e5;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
    input:focus{border-color:#cc0000}
    .error-msg{background:#fff0f0;border-left:3px solid #cc0000;padding:.7rem 1rem;font-size:.82rem;color:#cc0000;margin-bottom:1rem;display:none}
    .error-msg.show{display:block}
    .btn-login{width:100%;background:#cc0000;color:#fff;border:none;padding:1rem;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .2s;margin-top:.5rem}
    .btn-login:hover{background:#a30000}
    .btn-login:disabled{background:#ccc;cursor:not-allowed}
    .back-link{text-align:center;margin-top:1.5rem;font-size:.8rem;color:#999}
    .back-link a{color:#cc0000;text-decoration:none}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img src="../logo.png" alt="Li-Ning" onerror="this.style.display='none'">
      <p>Панель администратора</p>
    </div>
    <h1>Вход в систему</h1>
    <p class="subtitle">Введите данные для доступа к панели управления</p>

    <div class="error-msg" id="error-msg">Неверный логин или пароль</div>

    <div class="form-group">
      <label>Логин</label>
      <input type="text" id="login" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Пароль</label>
        <div style="position:relative">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="width:100%;padding:.8rem 2.8rem .8rem 1rem;border:1.5px solid #e5e5e5;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s">
          <button type="button" onclick="togglePassword()" style="position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#aaa;line-height:1" id="eye-btn">👁</button>
        </div>
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Войти →</button>

    <div class="back-link"><a href="../index.html">← На сайт</a></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dgyirginrefvjsbhhooi.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRneWlyZ2lucmVmdmpzYmhob29pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDUzNjgsImV4cCI6MjA5MzI4MTM2OH0.A-ueG5j_wcxZ7joJM645hrImLwFYjz_SM4ATLTc0cfU';

  // Если уже залогинен — redirect
  if (sessionStorage.getItem('admin_logged_in') === 'true') {
    window.location.href = 'dashboard.html';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const login    = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn      = document.getElementById('login-btn');
    const errMsg   = document.getElementById('error-msg');

    if (!login || !password) {
      errMsg.textContent = 'Заполните все поля';
      errMsg.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Проверяем...';
    errMsg.classList.remove('show');

    try {
      const res = await fetch(
      `${SUPABASE_URL}/rest/v1/rpc/check_admin`,
        {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ p_login: login, p_password: password })
        }
      );
      
      const result = await res.json();

      if (result === true) {
        sessionStorage.setItem('admin_logged_in', 'true');
        sessionStorage.setItem('admin_login', login);
        window.location.href = 'dashboard.html';
      } 
      else {
        errMsg.textContent = 'Неверный логин или пароль';
        errMsg.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Войти →';
      }
    } 
    
    catch(e) {
      errMsg.textContent = 'Ошибка подключения. Попробуйте снова.';
      errMsg.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Войти →';
    }
  }
  function togglePassword() {
  const input = document.getElementById('password');
  const btn   = document.getElementById('eye-btn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}
</script>
</body>
</html>
