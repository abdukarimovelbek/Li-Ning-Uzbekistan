<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Каталог — Li Ning Store</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8K29V08VJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8K29V08VJM');
  </script>
</head>
<body>

<!-- NAVBAR - тянется из отдельного файла -->  
<div id="navbar-placeholder"></div>

<!-- Page Header -->
<div class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb" data-manual="true" id="catalog-breadcrumb">
      <a href="index.html">Главная</a><span>/</span>
      <a href="catalog.html">Каталог</a>
      <span id="breadcrumb-extra"></span>
    </div>
    <h1 id="catalog-page-title">КАТАЛОГ</h1>
  </div>
</div>

<!-- Catalog Layout -->
<div class="section">
  <div class="catalog-layout">

    <!-- Filter Sidebar -->
    <aside class="filter-sidebar">

      <div class="filter-block">
      <div class="filter-block-head">
        Поиск <span class="toggle">▼</span>
      </div>
      <div class="filter-block-body open">
        <div style="display:flex;align-items:center;gap:.5rem;border:1.5px solid var(--gray-100);border-radius:var(--radius-sm);overflow:hidden;background:var(--cream)">
          <input 
            type="text" 
            id="catalog-search-input"
            placeholder="Поиск по каталогу..."
            style="flex:1;border:none;background:transparent;padding:.7rem .8rem;font-family:var(--font-body);font-size:.85rem;outline:none;color:var(--gray-900)"
            oninput="catalogSearchFilter(this.value)"
            onkeydown="if(event.key==='Enter') catalogSearchFilter(this.value)">
          <button onclick="catalogSearchFilter(document.getElementById('catalog-search-input').value)" 
            style="background:var(--red);border:none;padding:.7rem .9rem;cursor:pointer;display:flex;align-items:center;justify-content:center">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

      <div class="filter-block">
        <div class="filter-block-head">
          Цена (сум) <span class="toggle">▼</span>
        </div>
        <div class="filter-block-body">
          <div class="price-range">
            <div class="price-inputs">
              <input type="text" placeholder="От" value="0">
              <input type="text" id="price-max" placeholder="До" value="1 500 000">
            </div>
            <input type="range" id="price-slider" class="price-slider" min="0" max="1500000" value="1500000" step="50000">
          </div>
        </div>
      </div>

      <div class="filter-block">
        <div class="filter-block-head">
          Размер (EU) <span class="toggle">▼</span>
        </div>
        <div class="filter-block-body">
          <div class="size-grid">
            <button class="size-btn" data-size="36">36</button>
            <button class="size-btn" data-size="37">37</button>
            <button class="size-btn" data-size="38">38</button>
            <button class="size-btn" data-size="39">39</button>
            <button class="size-btn" data-size="40">40</button>
            <button class="size-btn" data-size="41">41</button>
            <button class="size-btn" data-size="42">42</button>
            <button class="size-btn" data-size="43">43</button>
            <button class="size-btn" data-size="44">44</button>
            <button class="size-btn" data-size="45">45</button>
            <button class="size-btn" data-size="46">46</button>
            <button class="size-btn unavailable" data-size="47">47</button>
          </div>
        </div>
      </div>

      <div class="filter-block">
        <div class="filter-block-head">
          Категория <span class="toggle">▼</span>
        </div>
        <div class="filter-block-body">
          <label class="filter-brand-item"><input type="checkbox" value="shoes"> Кроссовки</label>
          <label class="filter-brand-item"><input type="checkbox" value="clothing"> Одежда</label>
          <label class="filter-brand-item"><input type="checkbox" value="running"> Бег</label>
          <label class="filter-brand-item"><input type="checkbox" value="training"> Тренировка</label>
          <label class="filter-brand-item"><input type="checkbox" value="accessories"> Аксессуары</label>
        </div>
      </div>

      <button class="filter-clear-btn">Сбросить всё</button>
    </aside>

    <!-- Products -->
    <div>
      <div class="catalog-toolbar">
        <div class="catalog-count">Найдено <strong>12</strong> товаров</div>
          <div class="catalog-sort">
            <select class="sort-select-styled">
              <option value="">По умолчанию</option>
              <option value="price-asc">Цена: по возрастанию</option>
              <option value="price-desc">Цена: по убыванию</option>
              <option value="rating">По рейтингу</option>
              <option value="new">Новинки</option>
            </select>
          </div>
        </div>

        <div class="products-grid" id="catalog-products">
          <div style="padding:3rem;text-align:center;color:#aaa">Загрузка товаров...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Footer - тянется из отдельного файла-->
<div id="footer-placeholder"></div>
<div id="modals-placeholder"></div>

<script src="js/main.js"></script>
</body>
</html>
