    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8K29V08VJM');

    function toggleFilterPanel() {
      const panel   = document.getElementById('filter-panel');
      const overlay = document.getElementById('filter-overlay');
      const btn     = document.getElementById('filter-toggle-btn');
      const isOpen  = panel?.classList.contains('open');
      panel?.classList.toggle('open');
      overlay?.classList.toggle('open');
      btn?.classList.toggle('active');
      document.body.style.overflow = isOpen ? '' : 'hidden';
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.fp-acc-head').forEach(head => {

<script src="js/main.js"></script>

<script>
// Sync count + count-up для мобильного хедера
(function(){
  function countUpMob(n){
    const el=document.getElementById('ch-cnt-num');
    const corner=document.getElementById('chCornerNum');
    if(!el) return;
    let t0=null;
    const dur=900;
    (function tick(now){
      if(!t0) t0=now;
      const p=Math.min((now-t0)/dur,1);
      const v=Math.round((1-Math.pow(1-p,3))*n);
      el.textContent=v;
      if(corner) corner.textContent=v;
      if(p<1) requestAnimationFrame(tick);
    })(performance.now());
  }
  // Следим за изменением счётчика товаров и синхронизируем мобильный хедер
  const obs=new MutationObserver(()=>{
    const n=parseInt(document.querySelector('.catalog-count strong')?.textContent)||0;
    if(n>0) countUpMob(n);
  });
  function attachCountObs(){
    const el=document.querySelector('.catalog-count strong');
    if(el){
      obs.observe(el,{childList:true,characterData:true,subtree:true});
      const n=parseInt(el.textContent)||0;
      if(n>0) countUpMob(n);
    } else {
      setTimeout(attachCountObs,100);
    }
  }
  attachCountObs();

  // Заголовок из URL
  const p=new URLSearchParams(location.search);
  const titles={'male':'МУЖЧИНЫ','female':'ЖЕНЩИНЫ','kids':'ДЕТИ'};
  const collectionTitles={
    'Basketball':'БАСКЕТБОЛ','Running':'БЕГ','Fitness':'ФИТНЕС',
    'Lifestyle':'СТИЛЬ','Wade':'WADE','Outdoor':'OUTDOOR',
    'Sportlife':'SPORT LIFE','Swimming':'ПЛАВАНИЕ'
  };
  const t=document.getElementById('ch-mob-title');
  const h1=document.getElementById('catalog-page-title');
  if(p.get('collection')){
    const colName = collectionTitles[p.get('collection')] || p.get('collection').toUpperCase();
    if(t) t.textContent = colName;
    if(h1) h1.textContent = colName;
  } else if(p.get('gender')){
    const gName = titles[p.get('gender')] || 'КАТАЛОГ';
    if(t) t.textContent = gName;
    if(h1) h1.textContent = gName;
  }

  // Chips
  document.getElementById('chipsScrollMob')?.addEventListener('click',e=>{
    const btn=e.target.closest('.chip-mob');
    if(!btn) return;
    document.querySelectorAll('.chip-mob').forEach(c=>c.classList.remove('on'));
    btn.classList.add('on');
    const filterType = btn.dataset.filterType;
    const cat = btn.dataset.cat;
    if (filterType === 'collection') {
      window.setCollectionFilter?.(cat);
    } else {
      window.setCategoryFilter?.(cat);
    }
  });

  // Параллакс кинетического текста при скролле
  const kinetic=document.getElementById('chKineticMob');
  const header=document.getElementById('catHeaderMob');
  if(kinetic && header){
    window.addEventListener('scroll',()=>{
      const y=window.scrollY;
      if(y < header.offsetHeight+80)
        kinetic.style.transform=`translate(-50%,calc(-50% + ${y*.4}px))`;
    },{passive:true});
  }
})();
</script>
